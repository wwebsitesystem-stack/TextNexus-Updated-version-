<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent; /* Keeps it blending perfectly into index.html */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 60px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .main-content {
            max-width: 700px;
        }

        /* Clean, static text styling instead of input boxes */
        .site-title {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .site-description {
            color: #a0a0b0;
            font-size: 1.15rem;
            line-height: 1.7;
            font-weight: 400;
        }

        /* Bottom Footer Area */
        .footer {
            border-top: 1px solid #1a1a24;
            padding-top: 30px;
        }

        .contact-heading {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #505064;
            margin-bottom: 10px;
        }

        .email-link {
            color: #00ffcc; /* Cyan accent matching your setup */
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .email-link:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <!-- Main Section: Change your Title and Description right here in the HTML -->
    <div class="main-content">
        <h1 class="site-title">Nexus</h1>
        
        <p class="site-description">
            Type what the website is about here. This is your dedicated layout section for dropping in your project details, app features, or network terminal descriptions.
        </p>
    </div>

    <!-- Bottom Contact Area -->
    <div class="footer">
        <div class="contact-heading">Contact Support</div>
        <a href="mailto:Text.Nexus.Official@outlook.com" class="email-link">Text.Nexus.Official@outlook.com</a>
    </div>

</body>
</html>
