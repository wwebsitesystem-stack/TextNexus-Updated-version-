<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Home</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container mimicking the rounded frame layout from image_8ff945.png but in cyberpunk dark-mode */
        .container {
            background-color: #030305;
            width: 100%;
            max-width: 1000px;
            min-height: 85vh;
            border-radius: 24px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #1a1a24;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .main-content {
            max-width: 600px;
        }

        /* Dynamic input fields for Title and Description */
        .input-group {
            margin-bottom: 25px;
        }

        .site-title-input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 700;
            width: 100%;
            outline: none;
            margin-bottom: 15px;
            caret-color: #00ffcc; /* Neon cyan cursor accent */
        }

        .site-title-input::placeholder {
            color: #2a2a35;
        }

        .site-desc-input {
            background: transparent;
            border: none;
            color: #a0a0b0;
            font-size: 1.1rem;
            line-height: 1.6;
            width: 100%;
            height: 100px;
            resize: none;
            outline: none;
            caret-color: #00ffcc;
        }

        .site-desc-input::placeholder {
            color: #2a2a35;
        }

        /* Bottom Footer Area */
        .footer {
            margin-top: 40px;
            border-top: 1px solid #1a1a24;
            padding-top: 30px;
        }

        .contact-heading {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #505064;
            margin-bottom: 10px;
        }

        .email-link {
            color: #00ffcc;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .email-link:hover {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top / Main Interactive Info Area -->
        <div class="main-content">
            <!-- Website Name Input -->
            <div class="input-group">
                <input type="text" class="site-title-input" placeholder="Type Website Name..." value="Nexus">
            </div>
            
            <!-- Website Description Input -->
            <div class="input-group">
                <textarea class="site-desc-input" placeholder="Type what the website is about here..."></textarea>
            </div>
        </div>

        <!-- Bottom Contact Area -->
        <div class="footer">
            <div class="contact-heading">Contact Support</div>
            <a href="mailto:Text.Nexus.Official@outlook.com" class="email-link">Text.Nexus.Official@outlook.com</a>
        </div>
    </div>

</body>
</html>
