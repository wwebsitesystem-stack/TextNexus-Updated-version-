<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Panel</title>
    <style>
        /* Force the browser to use 100% of the screen height */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents double scrolling */
        }

        /* Top Header Navigation Box */
        header {
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: center;
            flex-shrink: 0; /* Prevents the header from squishing */
        }

        .nav-container {
            width: 100%;
            max-width: 1400px;
            background-color: #0a0a0c;
            border: 1px solid #1f1f24;
            border-radius: 30px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: #888888;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a.active {
            color: #00bcd4; /* Light blue accent from your image */
        }

        /* Content Container that forces the iframe to expand */
        .content-area {
            flex: 1; /* Takes up all remaining vertical space */
            width: 100%;
            padding: 10px 20px 20px 20px;
            display: flex;
            justify-content: center;
        }

        /* The Iframe itself */
        iframe {
            width: 100%;
            max-width: 1400px;
            height: 100%; /* Stretches to fill .content-area */
            border: 1px solid #1f1f24;
            border-radius: 15px;
            background-color: #111115;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo">Nexus</a>
            <nav>
                <a href="#" class="active">Home</a>
                <a href="#">Ghost Link</a>
                <a href="#">AI Core</a>
                <a href="#">Security</a>
                <a href="#">About</a>
                <a href="#">Credits</a>
            </nav>
        </div>
    </header>

    <main class="content-area">
        <iframe src="https://wikipedia.org" name="main-frame"></iframe>
    </main>

</body>
</html>
