<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Panel</title>
    <style>
        /* Forces the page to take up 100% of the screen height */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevents awkward double scrollbars */
        }

        /* Top Header Area matching your image */
        header {
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: center;
            flex-shrink: 0; /* Keeps header from squishing */
        }

        .nav-container {
            width: 100%;
            max-width: 1400px;
            background-color: #050507;
            border: 1px solid #141417;
            border-radius: 30px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 22px;
        }

        nav a {
            color: #707075;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #ffffff;
        }

        /* Light blue color matching the 'HOME' text in your image */
        nav a.active {
            color: #00bcd4; 
        }

        /* The Box holding the iframe */
        .content-area {
            flex: 1; /* Automatically stretches to fill the rest of the screen */
            width: 100%;
            padding: 10px 20px 20px 20px;
            display: flex;
            justify-content: center;
        }

        /* The Iframe itself */
        iframe {
            width: 100%;
            max-width: 1400px;
            height: 100%;
            border: 1px solid #141417;
            border-radius: 16px;
            background-color: #0a0a0c;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo">Nexus</a>
            <nav>
                <a href="#" class="active">Home</a>
                <a href="#">Ghost Link</a>
                <a href="#">AI Core</a>
                <a href="#">Security</a>
                <a href="#">About</a>
                <a href="#">Credits</a>
            </nav>
        </div>
    </header>

    <main class="content-area">
        <iframe src="https://example.com" name="main-frame" title="Nexus Panel Content"></iframe>
    </main>

</body>
</html>
