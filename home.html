<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Terminal</title>
    <style>
        /* Modern reset & variables */
        :root {
            --accent-cyan: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --bg-grid: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #8e8e9f;
            --text-dark: #414150;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent; /* Seamless blend with index.html background */
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: clamp(40px, 8vw, 80px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* Subtle tech grid background overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(to right, var(--bg-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 10% 20%, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at 10% 20%, black, transparent 80%);
            z-index: -1;
            pointer-events: none;
        }

        /* Core Content Animations */
        .main-content {
            max-width: 680px;
            animation: cubic-bezier(0.16, 1, 0.3, 1) floatIn 1.2s forwards;
        }

        /* Tech-style Sub-badge */
        .tech-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", JetBrains Mono, monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-cyan);
            background: rgba(0, 255, 204, 0.06);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 204, 0.15);
            margin-bottom: 24px;
        }

        .tech-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        /* Clean modern title gradient */
        .site-title {
            font-size: clamp(2.5rem, 6vw, 3.8rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #ffffff 30%, #a3a3c2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        /* Crisp text layout */
        .site-description {
            color: var(--text-muted);
            font-size: 1.15rem;
            line-height: 1.75;
            font-weight: 400;
        }

        /* Bottom Footer Area */
        .footer {
            border-top: 1px dashed rgba(80, 80, 100, 0.3);
            padding-top: 30px;
            margin-top: 40px;
            animation: cubic-bezier(0.16, 1, 0.3, 1) floatIn 1.6s forwards;
        }

        .contact-heading {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", JetBrains Mono, monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        /* Ultra-smooth interactive email link */
        .email-link {
            color: var(--accent-cyan);
            text-decoration: none;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", JetBrains Mono, monospace;
            font-size: 1.05rem;
            font-weight: 500;
            position: relative;
            transition: color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
        }

        .email-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--accent-cyan);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 8px var(--accent-cyan);
        }

        .email-link:hover {
            color: #ffffff;
        }

        .email-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
            background-color: #ffffff;
        }

        /* Smooth Entry Animation Rules */
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="tech-badge">System Core v2.0</div>
        <h1 class="site-title">Nexus</h1>
        
        <p class="site-description">
            Details about website coming soon! This website is still in the process of being created!
        </p>
    </div>

    <div class="footer">
        <div class="contact-heading">// CONTACT_SUPPORT</div>
        <a href="mailto:Text.Nexus.Official@outlook.com" class="email-link">Text.Nexus.Official@outlook.com</a>
    </div>

</body>
</html>
