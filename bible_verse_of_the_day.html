<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Word & Prayer</title>
    <style>
        :root {
            --bg-color: #030305; /* Sleek black canvas background */
            --panel-bg: #111115;
            --accent-color: #d4af37; /* Elegant gold accent */
            --accent-glow: rgba(212, 175, 55, 0.15);
            --text-main: #ffffff;
            --text-muted: #8a8a93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Wraps the entire page to center the UI nicely inside frames or parent wrappers */
        .devotional-wrapper {
            background-color: var(--bg-color);
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            font-family: 'Segoe UI', Roboto, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Subtle ambient glow effect behind the main layout */
        .devotional-wrapper::before {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: var(--accent-glow);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 0;
        }

        /* Main Center Panel Display */
        .core-container {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), 0 0 15px var(--accent-glow);
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 35px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Live Tracker Clock Style */
        .time-tracker {
            font-family: monospace;
            font-size: 1rem;
            color: var(--accent-color);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .devotional-wrapper h1 {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 20px 0;
        }

        .content-block {
            margin-bottom: 15px;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .verse-text, .prayer-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e4e4e7;
            font-style: italic;
        }

        .verse-ref {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-style: normal;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Flashing Speak Out Loud Prompt */
        .instruction {
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: textBlink 2.5s infinite;
        }

        @keyframes textBlink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="devotional-wrapper">
        <div class="core-container">
            <div class="time-tracker" id="clock">CONNECTING TO TIME SYSTEM...</div>
            
            <h1>Daily Devotional</h1>
            
            <div class="section-divider"></div>

            <!-- Bible Verse of the Day -->
            <div class="content-block">
                <div class="label">Verse of the Day</div>
                <div class="verse-text" id="verse">"Loading today's scripture..."</div>
                <div class="verse-ref" id="reference">---</div>
            </div>

            <div class="section-divider"></div>

            <!-- Prayer of the Day -->
            <div class="content-block">
                <div class="label">Prayer for Today</div>
                <div class="prayer-text" id="prayer">"Formulating today's prayer..."</div>
                <div class="instruction">▲ Read this prayer out loud ▲</div>
            </div>
        </div>
    </div>

    <script>
        // Array containing daily scripture pairings and custom generated prayers
        const dailyData = [
            {
                verse: "For I know the plans I have for you,\" declares the Lord, \"plans to prosper you and not to harm you, plans to give you hope and a future.",
                ref: "Jeremiah 29:11",
                prayer: "Heavenly Father, I align myself with Your perfect plans today. Remove any fear of the future from my heart. I step out in faith, trusting that You are guiding my steps toward prosperity, hope, and purpose. Amen."
            },
            {
                verse: "I can do all things through Christ who strengthens me.",
                ref: "Philippians 4:13",
                prayer: "Lord, when my own energy fails, remind me that Your supernatural power dwells within me. Today, I rely not on my own strength, but on Yours. Fill me with the capability to overcome every obstacle. Amen."
            },
            {
                verse: "The Lord is my shepherd; I shall not want.",
                ref: "Psalm 23:1",
                prayer: "God, thank You for being my guide and provider. I rest in the truth that you supply everything I truly need. Lead me beside quiet waters today and restore my soul as I trust in Your provision. Amen."
            },
            {
                verse: "Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.",
                ref: "Joshua 1:9",
                prayer: "Father, clear away all anxiety and discouragement from my mind. Give me a bold and courageous heart to face today's challenges, knowing deeply that I never walk alone because You are with me. Amen."
            },
            {
                verse: "Trust in the Lord with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight.",
                ref: "Proverbs 3:5-6",
                prayer: "Lord, I surrender my need to control and figure everything out. I choose to trust Your infinite wisdom over my limited logic. Take the lead today, straighten my path, and order my steps. Amen."
            }
        ];

        // Track live user time
        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (!clockEl) return;
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            const dateString = now.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            clockEl.innerText = `${dateString} // ${timeString}`;
        }

        // Auto change data index depending on the calendar day
        function setDailyContent() {
            const verseEl = document.getElementById('verse');
            const refEl = document.getElementById('reference');
            const prayerEl = document.getElementById('prayer');
            
            if (!verseEl || !refEl || !prayerEl) return;

            const now = new Date();
            const dayIndex = (now.getDate() + now.getMonth()) % dailyData.length;
            const currentSelection = dailyData[dayIndex];

            verseEl.innerText = `"${currentSelection.verse}"`;
            refEl.innerText = currentSelection.ref;
            prayerEl.innerText = `"${currentSelection.prayer}"`;
        }

        // Initialize execution setup loops
        updateClock();
        setDailyContent();
        setInterval(updateClock, 1000);
        setInterval(setDailyContent, 3600000); // Automatically verifies time updates every hour
    </script>
</body>
</html>
