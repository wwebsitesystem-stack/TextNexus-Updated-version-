<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #050505;
  }

  .pulse-container {
    position: relative;
    width: 200px;
    height: 200px;
  }

  .circle {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid #00d4ff;
    box-shadow: 0 0 20px #00d4ff, inset 0 0 20px #00d4ff;
    animation: pulse 3s infinite ease-in-out;
  }

  /* Delaying the circles creates a detailed, ripple effect */
  .circle:nth-child(2) { animation-delay: 0.5s; opacity: 0.6; }
  .circle:nth-child(3) { animation-delay: 1s; opacity: 0.3; }

  @keyframes pulse {
    0% { transform: scale(0.5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
  }
</style>
</head>
<body>

<div class="pulse-container">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
</div>

</body>
</html>
