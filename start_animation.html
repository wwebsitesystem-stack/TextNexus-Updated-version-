<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | System Initialization</title>
    <style>
        :root {
            --nexus-blue: #00e5ff;
            --nexus-dark: #020202;
            --text-main: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; overflow: hidden; }

        body {
            background-color: var(--nexus-dark);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            transition: opacity 1s ease, transform 1s ease;
        }

        /* 1. Moving Cybernetic Grid */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 200vw; height: 200vh;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 10s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        /* 2. Giant Background Logo */
        .bg-logo {
            position: absolute;
            font-size: 600px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: 1;
            user-select: none;
            letter-spacing: -20px;
            animation: pulseLogo 4s infinite alternate;
        }
