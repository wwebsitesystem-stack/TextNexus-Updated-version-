<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Solutions Menu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; margin-bottom: 40px; }
        h1 { color: #00ffcc; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px; }
        p { color: #505064; font-size: 0.75rem; font-family: monospace; margin-top: 5px; }
        
        .section-divider {
            width: 100%; max-width: 900px; color: #505064; font-family: monospace;
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
            margin: 30px 0 15px 0; border-bottom: 1px dashed #14141f; padding-bottom: 5px;
        }

        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px; width: 100%; max-width: 900px;
        }
        .menu-card {
            background: #050508; border: 1px solid #14141f; border-radius: 6px;
            padding: 20px; cursor: pointer; transition: all 0.2s ease;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 140px; /* Keeps the cards clean and uniform */
        }
        .menu-card:hover {
            border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
            transform: translateY(-2px);
        }
        .card-title { color: #ffffff; font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        .card-desc { color: #a0a0b0; font-size: 0.8rem; line-height: 1.4; margin-bottom: 15px; }
        .action-tag { font-family: monospace; font-size: 0.65rem; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Nexus Integrated Architecture</h1>
        <p>PUBLIC_ROUTING_NODE_v4.5</p>
    </div>

    <div class="section-divider">// Client Modules & Tools</div>
    <div class="menu-grid">
        <div class="menu-card" onclick="routeNavigation('staffportal.html')">
            <div>
                <div class="card-title">Staff Portal</div>
                <div class="card-desc">Staff Portal is for staff only</div>
            </div>
            <div class="action-tag">Click here to enter</div>
        </div>

        <div class="menu-card" onclick="routeNavigation('')">
            <div>
                <div class="card-title"></div>
                <div class="card-desc"></div>
            </div>
            <div class="action-tag"></div>
        </div>

        <div class="menu-card" onclick="routeNavigation('')"> 
            <div>
                <div class="card-title"></div>
                <div class="card-desc"></div>
            </div>
            <div class="action-tag"></div>
        </div>
    </div>

    <script>
        function routeNavigation(targetUrl) {
            if (!targetUrl) return; // Prevent routing if the path is currently empty
            try {
                if (window.parent && window.parent !== window) {
                    if (typeof window.parent.loadExternalLinkFromMoreMenu === 'function') {
                        window.parent.loadExternalLinkFromMoreMenu(targetUrl);
                        return;
                    }
                    var mainIframe = window.parent.document.getElementById('main-viewport-iframe');
                    if (mainIframe) {
                        mainIframe.src = targetUrl;
                        return;
                    }
                }
            } catch (err) { console.log("Routing error caught."); }
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
