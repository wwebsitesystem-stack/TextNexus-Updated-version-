<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Bulletin</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050508;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 25px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 12px;
        }
        h2 {
            color: #00ffcc;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .date-badge {
            font-family: monospace;
            font-size: 0.75rem;
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.08);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .content-area {
            flex-grow: 1;
            margin: 20px 0;
            overflow-y: auto;
        }
        .update-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .update-text {
            font-size: 0.85rem;
            color: #a0a0b0;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .button-row {
            display: flex;
            justify-content: flex-end;
            padding-top: 10px;
        }
        .close-btn {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }
        .close-btn:hover {
            background: #00ffcc;
            color: #000000;
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div>
        <div class="header">
            <h2>System Bulletin</h2>
            <div class="date-badge" id="popup-date">🔥 NEW PATCH</div>
        </div>

        <div class="content-area">
            <div class="update-title" id="popup-title">Loading Hub Manifest...</div>
            <p class="update-text" id="popup-content">Synchronizing core streams to fetch recent patches...</p>
        </div>
    </div>

    <div class="button-row">
        <button class="close-btn" onclick="dismissPopup()">Dismiss Protocol</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const updatesRef = ref(db, 'recent_updates');

        onValue(updatesRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Find the newest logged update key folder entry 
            const sortedKeys = Object.keys(data).sort((a, b) => new Date(data[b].date) - new Date(data[a].date));
            const newest = data[sortedKeys[0]];

            // Update UI elements dynamically with content text strings
            document.getElementById("popup-title").innerText = newest.title || "System Update";
            document.getElementById("popup-date").innerText = newest.date || "LIVE";
            document.getElementById("popup-content").innerText = newest.content || "No patch notes specified.";
        });
    </script>

    <script>
        function dismissPopup() {
            // Reaches back to the parent window layout file to trigger the dismiss function smoothly
            if (window.parent && window.parent.closeUpdatePopup) {
                window.parent.closeUpdatePopup();
            }
        }
    </script>
</body>
</html>
