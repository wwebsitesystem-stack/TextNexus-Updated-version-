<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Stream // Broadcast Matrix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #020204; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; width: 100vw; display: flex; align-items: center;
            overflow: hidden; border-left: 3px solid #00ffcc; padding: 0 20px;
        }

        /* Ticker Container Setup */
        .ticker-wrapper {
            display: flex; align-items: center; width: 100%; gap: 25px;
        }

        /* Live Indicator Badge */
        .broadcast-badge {
            display: flex; align-items: center; gap: 8px;
            font-family: monospace; font-size: 0.72rem; color: #00ffcc;
            text-transform: uppercase; letter-spacing: 2px;
            background: rgba(0, 255, 204, 0.07); padding: 6px 12px;
            border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 4px;
            white-space: nowrap;
        }

        .pulse-dot {
            width: 7px; height: 7px; background-color: #00ffcc; border-radius: 50%;
            animation: broadcastPulse 1.5s infinite ease-in-out;
        }

        /* Core Projected Feed Element */
        #projected-content-output {
            font-size: 0.9rem; font-weight: 500; color: #ffffff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1;
        }

        /* Timer Badge Area */
        #projected-timer-output {
            font-family: monospace; font-size: 0.72rem; color: #ff3366;
            background: rgba(255, 51, 102, 0.07); padding: 6px 12px;
            border: 1px solid rgba(255, 51, 102, 0.2); border-radius: 4px;
            white-space: nowrap; display: none; font-weight: bold; letter-spacing: 0.5px;
        }

        @keyframes broadcastPulse {
            0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.5); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 8px 2px rgba(0, 255, 204, 0.3); }
            100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="broadcast-badge">
            <div class="pulse-dot"></div>
            <span>System Broadcast</span>
        </div>

        <div id="projected-content-output">
            Establishing continuous satellite downlink telemetry channel logs...
        </div>

        <div id="projected-timer-output"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        const contentOutput = document.getElementById("projected-content-output");
        const timerOutput = document.getElementById("projected-timer-output");

        // Continuously read status properties mapped from Firebase console
        onValue(ref(database, 'system/broadcast'), (snapshot) => {
            const broadcastData = snapshot.val();
            
            if (broadcastData) {
                // 1. Process string or injected HTML layouts safely
                if (broadcastData.content) {
                    contentOutput.innerHTML = broadcastData.content;
                } else {
                    contentOutput.innerHTML = `<span style="color: #505064; font-family: monospace;">[ Feed linked. Standing by for terminal stream variables... ]</span>`;
                }

                // 2. Process timer settings
                if (broadcastData.timer) {
                    timerOutput.innerText = broadcastData.timer.toUpperCase();
                    timerOutput.style.display = "block";
                } else {
                    timerOutput.style.display = "none";
                }
            } else {
                contentOutput.innerHTML = `<span style="color: #505064; font-family: monospace;">[ Grid offline. Waiting for manual override node instruction sets ]</span>`;
                timerOutput.style.display = "none";
            }
        });
    </script>
</body>
</html>
