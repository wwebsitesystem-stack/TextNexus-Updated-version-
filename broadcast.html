<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Architecture // System Broadcast Matrix</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; width: 100vw; display: flex; justify-content: center;
            align-items: center; overflow: hidden; position: relative;
        }

        /* Tech grid background pattern */
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1;
        }

        /* Main Broadcast Visual Container */
        .broadcast-container {
            position: relative; z-index: 2; width: 90%; max-width: 800px;
            background: rgba(5, 5, 8, 0.95); border: 2px solid #00ffcc;
            border-radius: 8px; padding: 40px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            text-align: center; display: flex; flex-direction: column; gap: 20px;
        }

        .broadcast-header {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-family: monospace; font-size: 0.85rem; color: #00ffcc;
            text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px dashed rgba(0, 255, 204, 0.3);
            padding-bottom: 15px; margin-bottom: 10px;
        }

        .pulse-dot {
            width: 8px; height: 8px; background-color: #00ffcc; border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Target injection wrapper for content feeds */
        #projected-content-output {
            font-size: 1.2rem; line-height: 1.6; color: #ffffff;
            word-wrap: break-word; text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        /* Timer display box */
        #projected-timer-output {
            font-family: monospace; font-size: 0.85rem; color: #ff3366;
            margin-top: 10px; font-weight: bold; letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 12px 4px rgba(0, 255, 204, 0.4); }
            100% { transform: scale(0.9); opacity: 0.4; box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="broadcast-container">
        <div class="broadcast-header">
            <div class="pulse-dot"></div>
            <span>// Incoming Live Command Transmission</span>
        </div>

        <div id="projected-content-output">
            Connecting to Nexus broadcast grid arrays...
        </div>

        <div id="projected-timer-output"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        
        const contentOutput = document.getElementById("projected-content-output");
        const timerOutput = document.getElementById("projected-timer-output");

        // Listen directly to your specific database paths
        onValue(ref(database, 'system/broadcast'), (snapshot) => {
            const broadcastData = snapshot.val();
            
            if (broadcastData) {
                // 1. Inject the text or code into the content spot
                if (broadcastData.content) {
                    contentOutput.innerHTML = broadcastData.content;
                } else {
                    contentOutput.innerHTML = `<span style="color: #505064; font-family: monospace; font-size: 0.9rem;">[ Standing by for terminal override projection feeds... ]</span>`;
                }

                // 2. Update the timer element if a timer exists
                if (broadcastData.timer) {
                    timerOutput.innerText = "TIME REGISTER: " + broadcastData.timer;
                    timerOutput.style.display = "block";
                } else {
                    timerOutput.style.display = "none";
                }
            } else {
                contentOutput.innerHTML = `<span style="color: #505064; font-family: monospace; font-size: 0.9rem;">[ No active transmission signals detected ]</span>`;
                timerOutput.style.display = "none";
            }
        });
    </script>
</body>
</html>
