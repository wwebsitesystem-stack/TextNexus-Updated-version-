<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Central | AI Tester Bot Daemon</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            background-color: #010409;
            color: #00f0ff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 20px;
            margin: 0;
        }
        .log-stream {
            border: 1px dashed #52788e;
            background: rgba(0, 240, 255, 0.02);
            padding: 15px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .error-line { color: #ff2a2a; }
        .success-line { color: #39ff14; }
    </style>
</head>
<body>

    <h3>🤖 NEXUS_AI_TESTER_BOT // BACKGROUND_DAEMON</h3>
    <p>Status: <span id="botStatus">INITIALIZING...</span></p>
    <div class="log-stream" id="logConsole">
        [SYSTEM] Initializing telemetry listener hooks...
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const botStatusEl = document.getElementById('botStatus');
        const logConsole = document.getElementById('logConsole');
        
        let isBotActive = false;

        // Initialize EmailJS (Get a free public key at emailjs.com to wire it up completely)
        emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");

        function log(text, type = 'info') {
            const time = new Date().toLocaleTimeString();
            let className = '';
            if (type === 'error') className = 'error-line';
            if (type === 'success') className = 'success-line';
            
            logConsole.innerHTML += `<div class="${className}">[${time}] ${text}</div>`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        // Global Frontend Error Catching Interceptor
        window.onerror = function(message, source, lineno, colno, error) {
            if (!isBotActive) return;
            
            const errorReport = `BUG_DETECTED: ${message} at ${source}:${lineno}`;
            log(errorReport, 'error');
            
            dispatchEmailAlert(errorReport);
        };

        // Core Email Pipeline
        function dispatchEmailAlert(errorMessage) {
            log("Compiling alert dispatch packet for administrator...", "info");
            
            const emailParams = {
                to_email: "brodywilliams0226@gmail.com",
                subject: "🚨 NEXUS ALERT: AI Tester Bot Error Report",
                message: `The AI Tester Bot has found an issue on the Nexus deployment:\n\n${errorMessage}\n\nTimestamp: ${new Date().toISOString()}`
            };

            // Sends silently via EmailJS backend delivery channels
            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', emailParams)
                .then(() => {
                    log("Alert email transmitted successfully to brodywilliams0226@gmail.com", "success");
                }, (error) => {
                    log(`Email delivery failed: ${JSON.stringify(error)}`, "error");
                });
        }

        // Dynamic Integrity Scanning Simulation loop
        function executeDeepSiteAudit() {
            if (!isBotActive) return;

            log("Executing structural DOM tree integrity validation scan...", "info");
            
            // Check for common bugs like broken structural element tags, missing titles, or rogue inputs
            const scriptElements = document.getElementsByTagName('script');
            const criticalInputs = document.getElementsByTagName('input');

            // Example check: Scan if an input lacks an ID or structure it shouldn't have
            for (let input of criticalInputs) {
                if (!input.id && input.type !== 'submit') {
                    dispatchEmailAlert(`Suspicious/Malconfigured UI input vector detected without unique identifying marker tracking attributes.`);
                }
            }

            log(`DOM Scan complete. Checked ${scriptElements.length} tracking script payloads. Status clean.`, "success");
            
            // Repeat verification engine loops every 60 seconds
            setTimeout(executeDeepSiteAudit, 60000);
        }

        // Firebase Command Listener Matrix
        onValue(ref(db, 'AI Tester Bot Status'), (snapshot) => {
            const statusCommand = (snapshot.val() || "").toLowerCase();
            
            if (statusCommand === "active") {
                isBotActive = true;
                botStatusEl.innerText = "ACTIVE // MONITORING GRID";
                botStatusEl.style.color = "#39ff14";
                log("AI Detection Core Status switched to ACTIVE. Monitoring frontend system runtimes...", "success");
                executeDeepSiteAudit();
            } else {
                isBotActive = false;
                botStatusEl.innerText = "DEACTIVE // SLEEP_MODE";
                botStatusEl.style.color = "#ff2a2a";
                log("AI Detection Core Status switched to DEACTIVE. Background execution routines suspended.", "error");
            }
        });
    </script>
</body>
</html>
