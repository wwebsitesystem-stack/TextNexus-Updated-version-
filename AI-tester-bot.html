<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Central | AI Tester Bot Daemon</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            background-color: #010409;
            color: #00f0ff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 20px;
            margin: 0;
        }
        .log-stream {
            border: 1px dashed #52788e;
            background: rgba(0, 240, 255, 0.02);
            padding: 15px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .error-line { color: #ff2a2a; }
        .success-line { color: #39ff14; }
    </style>
</head>
<body>

    <h3>🤖 NEXUS_AI_TESTER_BOT // BACKGROUND_DAEMON</h3>
    <p>Status: <span id="botStatus">INITIALIZING...</span></p>
    <div class="log-stream" id="logConsole">
        [SYSTEM] Initializing telemetry log buffer hooks...
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const botStatusEl = document.getElementById('botStatus');
        const logConsole = document.getElementById('logConsole');
        
        let isBotActive = false;
        let scanLogBuffer = []; // Holds issues found while bot is running active

        emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");

        function log(text, type = 'info') {
            const time = new Date().toLocaleTimeString();
            let className = '';
            if (type === 'error') className = 'error-line';
            if (type === 'success') className = 'success-line';
            
            logConsole.innerHTML += `<div class="${className}">[${time}] ${text}</div>`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        // Window error interceptor
        window.onerror = function(message, source, lineno, colno, error) {
            if (!isBotActive) return;
            const errorReport = `[RUNTIME_ERROR] ${message} at ${source} (Line ${lineno})`;
            log(errorReport, 'error');
            scanLogBuffer.push(errorReport);
        };

        // Sends email compiling what has been found so far upon deactivation
        function dispatchBulkSummaryEmail() {
            if (scanLogBuffer.length === 0) {
                log("Deactivation trace processed. No system errors accumulated during runtime cycle. Email dispatch skipped.", "info");
                return;
            }

            log("Compiling cumulative summary log sheet for administrator dispatch...", "info");
            
            let structuredLogs = scanLogBuffer.map((line, index) => `${index + 1}. ${line}`).join("\n");

            const emailParams = {
                to_email: "brodywilliams0226@gmail.com",
                subject: "📊 NEXUS REPORT: AI Tester Bot Runtime Summary Log",
                message: `The AI Tester Bot compiled the following logs before being set to deactive:\n\n${structuredLogs}\n\nSession Terminated: ${new Date().toISOString()}`
            };

            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', emailParams)
                .then(() => {
                    log("Session logs transmitted to brodywilliams0226@gmail.com. Clearing buffer.", "success");
                    scanLogBuffer = []; // Reset after sending
                }, (error) => {
                    log(`Bulk summary dispatch failure: ${JSON.stringify(error)}`, "error");
                });
        }

        function executeDeepSiteAudit() {
            if (!isBotActive) return;

            log("Analyzing structural content wrapper trees...", "info");
            
            // Runtime element parsing loop
            const parentInputs = document.getElementsByTagName('input');
            for (let input of parentInputs) {
                if (!input.id && input.type !== 'submit') {
                    const trackingWarn = `[DOM_WARNING] Form input element found missing distinct string tracking credentials.`;
                    if (!scanLogBuffer.includes(trackingWarn)) {
                        log(trackingWarn, 'error');
                        scanLogBuffer.push(trackingWarn);
                    }
                }
            }
            
            setTimeout(executeDeepSiteAudit, 30000);
        }

        // Firebase Command State Monitor Loop
        onValue(ref(db, 'AI Tester Bot Status'), (snapshot) => {
            const statusCommand = (snapshot.val() || "").toLowerCase();
            
            if (statusCommand === "active") {
                if (!isBotActive) { // Edge condition transition
                    isBotActive = true;
                    botStatusEl.innerText = "ACTIVE // MONITORING GRID";
                    botStatusEl.style.color = "#39ff14";
                    log("AI Detection Core Status switched to ACTIVE. Session monitoring initialization sequence clear.", "success");
                    executeDeepSiteAudit();
                }
            } else {
                if (isBotActive) { // Transition check: Switched from active down to deactive
                    isBotActive = false;
                    botStatusEl.innerText = "DEACTIVE // SLEEP_MODE";
                    botStatusEl.style.color = "#ff2a2a";
                    log("AI Detection Core status flagged as DEACTIVE. Compiling accumulated metrics...", "error");
                    dispatchBulkSummaryEmail();
                } else {
                    isBotActive = false;
                    botStatusEl.innerText = "DEACTIVE // SLEEP_MODE";
                    botStatusEl.style.color = "#ff2a2a";
                }
            }
        });
    </script>
</body>
</html>
