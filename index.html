<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; background-color: #000000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .dashboard-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Master Navbar Layer */
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #000000; padding: 12px 20px; border-bottom: 2px solid #00ffcc;
            position: relative; z-index: 100000;
        }
        .brand-logo { color: #ffffff; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .nav-btn {
            color: #a0a0b0; text-decoration: none; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px;
            border-radius: 4px; cursor: pointer; background: transparent; border: none; outline: none;
            transition: all 0.2s ease;
        }
        .nav-btn:hover, .nav-btn.active-tab { color: #00ffcc; background-color: rgba(0, 255, 204, 0.1); }
        
        /* Advanced Google Profile Auth UI */
        .auth-container { display: flex; align-items: center; gap: 12px; margin-left: 10px; }
        .user-profile-box { display: flex; align-items: center; gap: 8px; display: none; }
        
        .user-avatar {
            width: 26px; height: 26px; border-radius: 50%;
            border: 1.5px solid #00ffcc; object-fit: cover;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }
        .user-profile-tag {
            color: #00ffcc; font-size: 0.75rem; font-family: monospace;
            font-weight: bold; letter-spacing: 0.5px;
        }
        
        .auth-btn {
            background: linear-gradient(135deg, #00ffcc 0%, #0099ff 100%); color: #000;
            border: none; padding: 6px 14px; font-size: 0.72rem; font-weight: 700;
            border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-btn.logged-in {
            background: transparent; color: #ff3366; border: 1px solid #ff3366;
        }
        .auth-btn.logged-in:hover { background: rgba(255, 51, 102, 0.1); }
        
        /* Viewport Frame Panel Layout */
        .iframe-workspace { flex-grow: 1; width: 100%; height: 100%; position: relative; background: #000000; }
        .app-view-frame { width: 100%; height: 100%; border: none; display: block; background: #000000; }
        
        /* Overlay Navigation Panel Configuration */
        #more-menu-overlay-panel { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; background: #000000; 
        }

        /* Intercept Shield Layer - CRITICAL: Default is BLOCK to prevent refresh bypass glitches */
        #system-intercept-shield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 2147483647; display: block; border: none;
        }
    </style>
</head>
<body>

    <iframe id="system-intercept-shield" src="about:blank"></iframe>

    <div class="dashboard-container" id="master-app-wrapper">
        <header class="top-navbar">
            <div class="brand-logo">Nexus</div>
            <nav class="nav-links">
                <a href="home.html" target="nexus-main-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="updates.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">Updates</a>
                <a href="shoutout.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">Shoutouts</a>
                <a href="ghostlink.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">👻 GhostLink</a>
                <a href="ai-core.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">🧠 AI Core</a>
                <a href="security.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">🛡️ Security</a>
                <button id="more-toggle-btn" class="nav-btn" onclick="toggleMoreMenu()">More ▾</button>
                
                <div class="auth-container">
                    <div id="user-profile-box" class="user-profile-box">
                        <img id="user-avatar-img" class="user-avatar" src="" alt="Profile">
                        <span id="user-display-name" class="user-profile-tag"></span>
                    </div>
                    <button id="auth-action-trigger" class="auth-btn">Sign In</button>
                </div>
            </nav>
        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="nexus-main-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
            <iframe src="menu.html" id="more-menu-overlay-panel" class="app-view-frame"></iframe>
        </div>
    </div>

    <script>
        let isMoreMenuOpen = false;

        function switchActive(element) {
            if(isMoreMenuOpen) toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        function toggleMoreMenu() {
            const panel = document.getElementById("more-menu-overlay-panel");
            const btn = document.getElementById("more-toggle-btn");
            if (!isMoreMenuOpen) {
                panel.style.display = "block";
                panel.src = "menu.html"; 
                btn.innerHTML = "Close ✕";
                isMoreMenuOpen = true;
            } else {
                panel.style.display = "none";
                btn.innerHTML = "More ▾";
                isMoreMenuOpen = false;
            }
        }

        window.loadExternalLinkFromMoreMenu = function(targetUrl) {
            const mainFrame = document.getElementById("main-viewport-iframe");
            if (mainFrame) {
                mainFrame.src = targetUrl;
            }
            toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const rootRef = ref(database);

        const interceptShield = document.getElementById("system-intercept-shield");
        const authBtn = document.getElementById("auth-action-trigger");
        const profileBox = document.getElementById("user-profile-box");
        const avatarImg = document.getElementById("user-avatar-img");
        const userTag = document.getElementById("user-display-name");

        let lastCommandState = "";

        // --- 1. GOOGLE AUTHENTICATION CONTROLLER ---
        authBtn.addEventListener('click', () => {
            if (auth.currentUser) {
                signOut(auth).catch(err => console.error("Sign Out Error:", err));
            } else {
                signInWithPopup(auth, provider).catch(err => console.error("Sign In Error:", err));
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authBtn.innerText = "Log Out";
                authBtn.classList.add("logged-in");
                avatarImg.src = user.photoURL || "https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_96x96dp.png";
                userTag.innerText = user.displayName.toUpperCase();
                profileBox.style.display = "flex";
            } else {
                authBtn.innerText = "Sign In";
                authBtn.classList.remove("logged-in");
                profileBox.style.display = "none";
                avatarImg.src = "";
                userTag.innerText = "";
            }
        });

        // --- 2. REALTIME DATABASE SYSTEM ROUTER ---
        onValue(rootRef, (snapshot) => {
            try {
                const data = snapshot.val();
                
                // If there's an error or no data, we keep the screen black for safety
                if (!data) return;

                let dbCommand = "";
                let targetTimer = "";

                if (data["system"]) {
                    if (data["system"]["command"]) dbCommand = data["system"]["command"].trim();
                    if (data["system"]["timer"]) targetTimer = data["system"]["timer"].trim();
                }

                const stateSignature = dbCommand + "_" + targetTimer;
                if (stateSignature === lastCommandState) return; 
                lastCommandState = stateSignature;

                // Checking the system status strings exactly
                if (dbCommand === "SHUTDOWN") {
                    interceptShield.src = "complete_shutdown.html";
                    interceptShield.style.display = "block";
                } 
                else if (dbCommand === "MAINTENANCE") {
                    interceptShield.src = "maintenance.html?end=" + encodeURIComponent(targetTimer);
                    interceptShield.style.display = "block";
                } 
                else if (dbCommand === "SECURITY_LOCK") {
                    interceptShield.src = "security_m.html";
                    interceptShield.style.display = "block";
                } 
                else if (dbCommand === "TESTING") {
                    interceptShield.src = "testing.html";
                    interceptShield.style.display = "block";
                }
                else if (dbCommand === "COMPLETE_SHUTDOWN") {
                    interceptShield.src = "fully-complete-shutdown.html";
                    interceptShield.style.display = "block";
                } 
                else {
                    // Safe / Clean default state: Only hide the shield when we know the DB is clear!
                    interceptShield.src = "about:blank";
                    interceptShield.style.display = "none";
                }
            } catch(innerError) {
                console.error("Database parsing error handled safely: ", innerError);
            }
        });
    </script>
</body>
</html>
