<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform</title>
    <script src="https://accounts.google.com/g_si/client" async defer></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure Black Canvas */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .dashboard-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }

        /* Top Header Navbar */
        .top-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000000; /* Pure Black Header */
            padding: 15px 40px;
            border-bottom: 2px solid #00ffcc; /* Cyan core line accent */
            flex-shrink: 0;
        }

        /* Branding Group */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-logo {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-sub {
            color: #505064;
            font-size: 0.65rem;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* Central Navigation links container */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Style for the Navigation Buttons */
        .nav-btn {
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 14px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: #00ffcc;
            background-color: rgba(0, 255, 204, 0.05);
        }

        /* Highlights the active page tab layout */
        .nav-btn.active-tab {
            color: #00ffcc;
            background-color: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* Right Side Utilities holding Google Auth button */
        .right-utility {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Main Workspace Content Box */
        .iframe-workspace {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #000000;
        }

        .app-view-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="top-navbar">
            
            <div class="brand-section">
                <div class="brand-logo">Nexus</div>
                <div class="brand-sub">AI_HUD_INTERFACE_V4.5</div>
            </div>

            <nav class="nav-links">
                <a href="home.html" target="main-display-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="ghostlink.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Ghost Link</a>
                <a href="textnexus.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">TextNexus</a>
                <a href="ai-core.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">AI Core</a>
                <a href="verse-of-the-day.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Verse of the Day</a>
                <a href="security.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Security</a>
                <a href="AI-website-creator.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">AI Website Creator</a>
            </nav>

            <div class="right-utility">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_select="false">
                </div>

                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="dark"
                     data-text="signin_with"
                     data-size="medium"
                     data-logo_alignment="left">
                </div>
            </div>

        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="main-display-viewport" class="app-view-frame"></iframe>
        </div>
    </div>

    <script>
        // Tab switching highlight script
        function switchActive(element) {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        // Google Authentication Callback function
        function handleCredentialResponse(response) {
            // response.credential is a JWT Token containing user info
            console.log("Encoded JWT ID token: " + response.credential);
            
            // To process authentication, pass this token to your Node.js backend:
            /*
            fetch('/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            })
            .then(res => res.json())
            .then(data => console.log("Logged in user:", data));
            */
        }
    </script>

</body>
</html>
