<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure Black Canvas */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .dashboard-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }

        /* Top Header Navbar - Fixed for Mobile & iPad Scaling */
        .top-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000000;
            padding: 15px 20px;
            border-bottom: 2px solid #00ffcc; /* Cyan core line accent */
            flex-shrink: 0;
            flex-wrap: wrap; /* Allows items to wrap neatly on smaller screens */
            gap: 15px;
        }

        /* Branding Group */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-logo {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-sub {
            color: #505064;
            font-size: 0.65rem;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* Central Navigation links container - iPad & Mobile Scrollable Wrap */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            overflow-x: auto; /* Adds clean swipe scrolling for tabs on iPad/Phone */
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }

        /* Hide scrollbars for a clean high-tech look */
        .nav-links::-webkit-scrollbar {
            display: none;
        }

        /* Style for the Navigation Buttons */
        .nav-btn {
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap; /* Prevents text breaking into two lines on small screens */
        }

        .nav-btn:hover {
            color: #00ffcc;
            background-color: rgba(0, 255, 204, 0.05);
        }

        .nav-btn.active-tab {
            color: #00ffcc;
            background-color: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* Right Side Utilities holding Settings + Profile Auth */
        .right-utility {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Minimal Gear Settings SVG Link */
        .settings-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0a0b0;
            transition: color 0.2s ease, transform 0.2s ease;
            padding: 4px;
        }

        .settings-btn:hover {
            color: #00ffcc;
            transform: rotate(45deg);
        }

        .auth-button {
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 14px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.7rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .auth-button:hover {
            background-color: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .user-profile-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar-nav {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #00ffcc;
            object-fit: cover;
        }

        .sign-out-link {
            color: #505064;
            font-size: 0.65rem;
            cursor: pointer;
            text-transform: uppercase;
            font-family: monospace;
        }
        
        .sign-out-link:hover {
            color: #ff3366;
        }

        /* Main Workspace Content Box */
        .iframe-workspace {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #000000;
        }

        .app-view-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Responsive Breakpoints for Mobile/Small iPads */
        @media (max-width: 768px) {
            .top-navbar {
                padding: 10px 15px;
                flex-direction: column;
                align-items: flex-start;
            }
            .right-utility {
                position: absolute;
                top: 10px;
                right: 15px;
            }
            .nav-links {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="top-navbar">
            
            <div class="brand-section">
                <div class="brand-logo">Nexus</div>
                <div class="brand-sub">AI_HUD_INTERFACE_V4.5</div>
            </div>

            <nav class="nav-links">
                <a href="home.html" target="main-display-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="ghostlink.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Ghost Link</a>
                <a href="textnexus.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">TextNexus</a>
                <a href="ai-core.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">AI Core</a>
                <a href="verse-of-the-day.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Verse of the Day</a>
                <a href="updates.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Recent Updates</a>
                <a href="security.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Security</a>
                <a href="AI-website-creator.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">AI Website Creator</a>
                <a href="More.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">More</a>
            </nav>

            <div class="right-utility">
                <a href="settings.html" target="main-display-viewport" class="settings-btn" title="System Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </a>
                
                <div id="auth-zone">
                    <button class="auth-button" id="login-trigger-btn">Sign In</button>
                </div>
            </div>

        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="main-display-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
        </div>
    </div>

    <!-- Central Switch Navigation Logic -->
    <script>
        function switchActive(element) {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }
    </script>

    <!-- Unified Firebase Auth, Database & System Overlays Engine -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const authZone = document.getElementById("auth-zone");
        const loginBtn = document.getElementById("login-trigger-btn");

        loginBtn.addEventListener("click", () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Core authentication established successfully.");
                }).catch((error) => {
                    console.error("Auth Exception:", error.message);
                });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authZone.innerHTML = `
                    <div class="user-profile-group">
                        <img src="${user.photoURL || 'https://via.placeholder.com/32'}" class="user-avatar-nav" title="${user.displayName}">
                        <span class="sign-out-link" id="logout-trigger">Exit</span>
                    </div>
                `;
                document.getElementById("logout-trigger").addEventListener("click", () => {
                    signOut(auth);
                });
            } else {
                authZone.innerHTML = `<button class="auth-button" id="login-trigger-btn">Sign In</button>`;
                document.getElementById("login-trigger-btn").addEventListener("click", () => {
                    signInWithPopup(auth, provider);
                });
            }
        });

        // LIVE FIREBASE COMMAND SYSTEM OVERLAYS
        const systemCommandRef = ref(database, 'system/command');

        onValue(systemCommandRef, (snapshot) => {
            const currentCommand = snapshot.val();
            removeGlobalSystemOverlay();

            if (!currentCommand || currentCommand === "ONLINE") {
                return;
            }

            if (currentCommand === "SHUTDOWN") {
                triggerGlobalSystemOverlay("complete_shutdown.html");
            } else if (currentCommand === "MAINTENANCE") {
                triggerGlobalSystemOverlay("maintenance.html");
            } else if (currentCommand === "SECURITY_LOCK") {
                triggerGlobalSystemOverlay("security_m.html");
            } else if (currentCommand === "TESTING") {
                triggerGlobalSystemOverlay("testing.html");
            }
        });

        function triggerGlobalSystemOverlay(targetFile) {
            let overlayFrame = document.getElementById("nexus-system-overlay-frame");
            if (!overlayFrame) {
                overlayFrame = document.createElement("iframe");
                overlayFrame.id = "nexus-system-overlay-frame";
                overlayFrame.style.position = "fixed";
                overlayFrame.style.top = "0";
                overlayFrame.style.left = "0";
                overlayFrame.style.width = "100vw";
                overlayFrame.style.height = "100vh";
                overlayFrame.style.border = "none";
                overlayFrame.style.zIndex = "999999";
                document.body.appendChild(overlayFrame);
            }
            overlayFrame.src = targetFile;
        }

        function removeGlobalSystemOverlay() {
            const activeOverlay = document.getElementById("nexus-system-overlay-frame");
            if (activeOverlay) {
                activeOverlay.remove();
            }
        }
    </script>
</body>
</html>
