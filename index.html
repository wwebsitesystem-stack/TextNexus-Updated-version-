<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000; /* Pure Black Canvas */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .dashboard-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }

        /* Top Header Navbar */
        .top-navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #000000;
            padding: 15px 40px;
            border-bottom: 2px solid #00ffcc; /* Cyan core line accent */
            flex-shrink: 0;
        }

        /* Branding Group */
        .brand-section {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-logo {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-sub {
            color: #505064;
            font-size: 0.65rem;
            letter-spacing: 1px;
            font-family: monospace;
        }

        /* Central Navigation links container */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Style for the Navigation Buttons */
        .nav-btn {
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 14px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: #00ffcc;
            background-color: rgba(0, 255, 204, 0.05);
        }

        .nav-btn.active-tab {
            color: #00ffcc;
            background-color: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* Right Side Utilities holding Settings + Profile Auth */
        .right-utility {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .settings-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a0a0b0;
            transition: color 0.2s ease, transform 0.2s ease;
            padding: 4px;
        }

        .settings-btn:hover {
            color: #00ffcc;
            transform: rotate(45deg);
        }

        .auth-button {
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.75rem;
            transition: all 0.2s ease;
        }

        .auth-button:hover {
            background-color: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .user-avatar-nav {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #00ffcc;
            object-fit: cover;
            cursor: pointer;
        }

        /* Main Workspace Content Box */
        .iframe-workspace {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background-color: #000000;
        }

        .app-view-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="top-navbar">
            
            <div class="brand-section">
                <div class="brand-logo">Nexus</div>
                <div class="brand-sub">AI_HUD_INTERFACE_V4.5</div>
            </div>

            <nav class="nav-links">
                <a href="home.html" target="main-display-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="ghostlink.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Ghost Link</a>
                <a href="textnexus.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">TextNexus</a>
                <a href="ai-core.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">AI Core</a>
                <a href="verse-of-the-day.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Verse of the Day</a>
                <a href="security.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Security</a>
                <a href="AI-website-creator.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">AI Website Creator</a>
            </nav>

            <div class="right-utility">
                <a href="settings.html" target="main-display-viewport" class="settings-btn" title="System Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </a>
                
                <div id="auth-zone">
                    <button class="auth-button" id="login-trigger-btn">Sign In / Up</button>
                </div>
            </div>

        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="main-display-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // IMPORTING DATABASE COMMANDS
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your exact Firebase Project Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306",
            measurementId: "G-S6K1M5PZLE"
        };

        // Initialize App Connections
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const database = getDatabase(app); // Database initialized
        const provider = new GoogleAuthProvider();

        const authZone = document.getElementById("auth-zone");

        // Watch user session status
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authZone.innerHTML = `<img src="${user.photoURL || 'https://via.placeholder.com/36'}" id="logout-trigger" class="user-avatar-nav" title="Click to Sign Out">`;
                
                document.getElementById('logout-trigger').addEventListener('click', () => {
                    if(confirm("Log out of your Nexus session?")) {
                        signOut(auth);
                    }
                });

                // EXAMPLE COMMAND: Write/Save user setup info down inside the Realtime Database safely
                set(ref(database, 'users/' + user.uid), {
                    username: user.displayName,
                    email: user.email,
                    lastLogin: new Date().toISOString()
                }).catch(err => console.error("Database block:", err.message));

                // Sync iframe views
                const iframe = document.getElementById('main-viewport-iframe');
                if(iframe && iframe.contentWindow) {
                    iframe.contentWindow.location.reload();
                }
            } else {
                authZone.innerHTML = `<button class="auth-button" id="login-trigger-btn">Sign In / Up</button>`;
                
                document.getElementById('login-trigger-btn').addEventListener('click', () => {
                    signInWithPopup(auth, provider).catch(err => console.error("Login canceled:", err.message));
                });

                const iframe = document.getElementById('main-viewport-iframe');
                if(iframe && iframe.contentWindow) {
                    iframe.contentWindow.location.reload();
                }
            }
        });
    </script>

    <script>
        function switchActive(element) {
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }
    </script>

</body>
</html>
