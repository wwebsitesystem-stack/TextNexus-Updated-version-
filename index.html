<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Global Command</title>
    <style>
        :root { 
            --nexus-blue: #00e5ff; 
            --nexus-blue-glow: rgba(0, 229, 255, 0.4);
            --nexus-dark: #050508; 
            --nexus-card: rgba(10, 11, 18, 0.75);
            --text-main: #ffffff; 
            --text-muted: #707585;
            --font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Full Viewport Lock & Cyber Grid Background */
        body { 
            background-color: var(--nexus-dark); 
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        /* Sleek Modern Header */
        header { 
            position: relative; 
            margin: 20px 24px 15px 24px; 
            flex-shrink: 0; /* Prevents header from collapsing */
            height: 64px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 30px; 
            background: var(--nexus-card); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 225, 255, 0.15); 
            border-radius: 16px; 
            z-index: 1000;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 225, 255, 0.05);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo { 
            font-weight: 900; 
            letter-spacing: 4px; 
            color: var(--text-main); 
            text-transform: uppercase; 
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Live Status Pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            color: var(--nexus-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--nexus-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--nexus-blue);
            animation: pulse 2s infinite;
        }

        /* Nav & Control Container */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Futuristic Navigation */
        nav ul { display: flex; list-style: none; gap: 4px; margin: 0; padding: 0; }
        
        nav ul li a { 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600;
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            cursor: pointer; 
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        nav ul li a:hover { 
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
        }

        nav ul li a.active { 
            color: var(--nexus-blue); 
            background: rgba(0, 229, 255, 0.05);
            border-color: rgba(0, 229, 255, 0.25);
            text-shadow: 0 0 8px var(--nexus-blue-glow);
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.03);
        }

        /* Firebase Auth UI Module */
        .auth-module {
            display: flex;
            align-items: center;
        }

        .btn-auth {
            background: transparent;
            color: var(--nexus-blue);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-auth:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 15px var(--nexus-blue-glow);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px 4px 6px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--nexus-blue);
            object-fit: cover;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            color: var(--text-main);
            font-size: 11px;
            font-weight: 600;
            max-width: 90px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-logout {
            background: none;
            border: none;
            color: #ff4a4a;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0;
            cursor: pointer;
            text-align: left;
            width: fit-content;
        }
        
        .btn-logout:hover { text-decoration: underline; }
        .hidden { display: none !important; }

        /* --- UPDATED: FULL PAGE VIEWPORT FRAME CONTAINER --- */
        .frame-container { 
            flex-grow: 1; 
            width: calc(100% - 48px); /* Full width minus side margins */
            margin: 0 24px 24px 24px; /* Flushed to edges with clean margin layout */
            position: relative; 
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.15); /* Tech frame border matches neon tone */
            background: rgba(3, 4, 7, 0.6);
            box-shadow: 0 24px 70px rgba(0,0,0,0.8), inset 0 0 30px rgba(0, 229, 255, 0.02);
        }

        #nexusFrame { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: transparent;
            display: block;
        }

        /* Modern Loading Overlay for Frame Switching */
        .frame-loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nexus-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .frame-loader.loading { opacity: 0.96; pointer-events: all; }
        
        .spinner {
            width: 44px; height: 44px;
            border: 2px solid rgba(0, 229, 255, 0.1);
            border-top: 2px solid var(--nexus-blue);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.5); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 229, 255, 0); }
            100% { transform: scale(0.95); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="logo">Nexus</div>
            <div class="status-pill">
                <div class="status-dot"></div>
                <span id="system-status-text">Core Node: Live</span>
            </div>
        </div>
        
        <div class="nav-container">
            <nav>
                <ul>
                    <li><a href="home.html" target="nexus-window" class="nav-link active">Home</a></li>
                    <li><a href="ghostlink.html" target="nexus-window" class="nav-link">Ghost Link</a></li>
                    <li><a href="hand_tracking.html" target="nexus-window" class="nav-link">AI Core</a></li>
                    <li><a href="security.html" target="nexus-window" class="nav-link">Security</a></li>
                    <li><a href="bible-verse-of-the-day.html" target="nexus-window" class="nav-link">Verse of the Day</a></li>
                    <li><a href="website_information.html" target="nexus-window" class="nav-link">About</a></li>
                    <li><a href="credits.html" target="nexus-window" class="nav-link">Credits</a></li>
                </ul>
            </nav>

            <div class="auth-module">
                <button id="btnSignIn" class="btn-auth">Sign In</button>
                <div id="userProfile" class="user-profile hidden">
                    <img id="userImg" class="user-avatar" src="" alt="User Identity">
                    <div class="user-details">
                        <span id="userName" class="user-name">Operator</span>
                        <button id="btnSignOut" class="btn-logout">Disconnect</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="frame-container">
        <div class="frame-loader" id="frameLoader"><div class="spinner"></div></div>
        <iframe name="nexus-window" src="home.html" id="nexusFrame"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306",
            measurementId: "G-S6K1M5PZLE"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const frame = document.getElementById('nexusFrame');
        const statusText = document.getElementById('system-status-text');
        const btnSignIn = document.getElementById('btnSignIn');
        const btnSignOut = document.getElementById('btnSignOut');
        const userProfile = document.getElementById('userProfile');
        const userImg = document.getElementById('userImg');
        const userName = document.getElementById('userName');

        btnSignIn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        btnSignOut.addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                btnSignIn.classList.add('hidden');
                userProfile.classList.remove('hidden');
                userName.innerText = user.displayName || "Operator";
                userImg.src = user.photoURL || "https://i.imgur.com/6VB8Hz0.png";
            } else {
                userProfile.classList.add('hidden');
                btnSignIn.classList.remove('hidden');
            }
        });

        onValue(ref(db, 'System'), (snapshot) => {
            const status = snapshot.val();
            const statusPages = {
                "SHUTDOWN": "complete_shutdown.html",
                "MAINTENANCE": "maintenance.html",
                "SECURITY": "security_m.html",
                "TESTING": "testing.html"
            };
            if (statusPages[status]) {
                frame.src = statusPages[status];
                statusText.innerText = `SYS STATUS: ${status}`;
            } else if (status === "ONLINE") {
                frame.src = "home.html";
                statusText.innerText = "Core Node: Live";
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('.nav-link');
            const loader = document.getElementById('frameLoader');
            const frame = document.getElementById('nexusFrame');

            links.forEach(link => {
                link.addEventListener('click', () => {
                    links.forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    loader.classList.add('loading');
                });
            });

            frame.addEventListener('load', () => {
                loader.classList.remove('loading');
            });
        });
    </script>
</body>
</html>
