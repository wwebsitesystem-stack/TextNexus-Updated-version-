    <script>
        function loadIntoFrame(targetUrl) {
            const frame = document.getElementById('app-frame');
            frame.style.display = 'block';

            const styles = getComputedStyle(document.documentElement);
            const accent = styles.getPropertyValue('--accent').trim();
            const bg = styles.getPropertyValue('--bg').trim();
            const font = styles.getPropertyValue('--font').trim();

            const injectThemeScript = (html) => {
                const styles = getComputedStyle(document.documentElement);
                const accent = styles.getPropertyValue('--accent').trim();
                const bg = styles.getPropertyValue('--bg').trim();
                const font = styles.getPropertyValue('--font').trim();

                const themeScript = `
                    <script>
                        (function() {
                            document.documentElement.style.setProperty('--accent-color', \`${accent}\`);
                            document.documentElement.style.setProperty('--bg-dark', \`${bg}\`);
                            document.documentElement.style.setProperty('--font-family', \`${font}\`);
                            function patchLinks() {
                                document.querySelectorAll('a[href]').forEach(function(a) {
                                    var href = a.getAttribute('href');
                                    if (href && !href.startsWith('#') && !href.startsWith('javascript')) {
                                        a.setAttribute('target', '_blank');
                                        a.setAttribute('rel', 'noopener noreferrer');
                                    }
                                });
                            }
                            document.addEventListener('DOMContentLoaded', patchLinks);
                            var observer = new MutationObserver(patchLinks);
                            document.addEventListener('DOMContentLoaded', function() {
                                observer.observe(document.body, { childList: true, subtree: true });
                            });
                            document.addEventListener('click', function(e) {
                                var a = e.target.closest('a[href]');
                                if (a) {
                                    var href = a.getAttribute('href');
                                    if (href && !href.startsWith('#') && !href.startsWith('javascript')) {
                                        e.preventDefault();
                                        window.open(href, '_blank', 'noopener,noreferrer');
                                    }
                                }
                            }, true);
                        })();
                    <\/script>`;
                return html.includes('<head>') ? html.replace('<head>', '<head>' + themeScript) : themeScript + html;
            };

            if (targetUrl.startsWith('data:text/html') || targetUrl.trim().startsWith('<')) {
                frame.removeAttribute('src');
                let rawHtml = targetUrl.startsWith('data:') ? decodeURIComponent(targetUrl.split(',')[1]) : targetUrl;
                frame.srcdoc = injectThemeScript(rawHtml);
                frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
                return;
            }

            const isGitHub = targetUrl.includes('github.com');
            const isJsDelivr = targetUrl.includes('cdn.jsdelivr.net');

            if (isGitHub || isJsDelivr) {
                let processedUrl = targetUrl;
                if (isGitHub && !targetUrl.includes('raw.githubusercontent.com')) {
                    processedUrl = targetUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                }

                fetch(processedUrl)
                    .then(response => {
                        if (!response.ok) throw new Error(`Fetch failed`);
                        return response.text();
                    })
                    .then(htmlContent => {
                        frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox');
                        frame.srcdoc = injectThemeScript(htmlContent);
                    })
                    .catch(err => {
                        console.warn('Raw fetch failed, falling back to direct src load.');
                        frame.removeAttribute('srcdoc');
                        frame.src = `${targetUrl}${targetUrl.includes('?') ? '&' : '?'}accent=${encodeURIComponent(accent)}&bg=${encodeURIComponent(bg)}`;
                    });
            } else {
                frame.removeAttribute('srcdoc');
                if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://') && !targetUrl.startsWith('file://')) {
                    try {
                        targetUrl = new URL(targetUrl, location.href).href;
                    } catch (e) {
                        targetUrl = 'https://' + targetUrl;
                    }
                }
                frame.src = `${targetUrl}${targetUrl.includes('?') ? '&' : '?'}accent=${encodeURIComponent(accent)}&bg=${encodeURIComponent(bg)}`;
            }
        }
    </script>
    <style>
        :root {
            --bg: #030712;
            --sidebar-bg: rgba(3, 7, 18, 0.4);
            --accent: #6ecbff;
            --accent-glow: rgba(110, 203, 255, 0.25);
            --text-primary: #f3f4f6;
            --text-dim: #9ca3af;
            --border: rgba(110, 203, 255, 0.15);
            --font: 'Courier New', monospace;

            --input-bg: rgba(255, 255, 255, 0.04);
            --bg-image: none;
            --bg-blur: 16px;
            --bg-brightness: 100%;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        button, input, select, textarea, optgroup { font-family: var(--font); }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Dynamic Light Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(110, 203, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(110, 203, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: -1;
            pointer-events: none;
        }

        /* Glassmorphic Sidebar Enhancements */
        .sidebar {
            position: fixed; 
            top: 0; left: 0; height: 100vh; width: 72px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(var(--bg-blur));
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 0;
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1000;
        }
        .sidebar:hover { width: 220px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }

        .logo-box { 
            margin-bottom: 40px; 
            color: var(--accent); 
            font-size: 32px; 
            text-shadow: 0 0 15px var(--accent-glow);
            cursor: default; flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .sidebar:hover .logo-box { transform: scale(1.05) rotate(5deg); }

        .nav-group { 
            width: 100%; flex-grow: 1; 
            overflow-y: auto; overflow-x: hidden; 
            display: flex; flex-direction: column;
            scrollbar-width: none;
        }
        .nav-group::-webkit-scrollbar { display: none; }

        .nav-item {
            width: 100%; min-height: 50px; height: 50px; flex-shrink: 0;
            display: flex; align-items: center;
            color: var(--text-dim); cursor: pointer;
            transition: background 0.2s, color 0.2s, padding-left 0.2s;
            text-decoration: none; white-space: nowrap;
            overflow: hidden; position: relative; user-select: none;
        }

        .nav-item::before {
            content: ''; position: absolute; left: 12px;
            width: 48px; height: 48px; background: transparent;
            border-radius: 12px; transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: -1;
        }
        .nav-item.active::before { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .sidebar:hover .nav-item.active::before { width: calc(100% - 24px); }

        .nav-item svg {
            min-width: 72px; height: 24px;
            stroke: currentColor; stroke-width: 2; fill: none;
            pointer-events: none; transition: transform 0.2s ease;
        }
        .nav-item:hover svg { transform: scale(1.1); }

        .nav-item span { 
            position: absolute; left: 72px; opacity: 0; 
            transition: opacity 0.2s ease, transform 0.2s ease; 
            transform: translateX(-10px); pointer-events: none;
        }
        .sidebar:hover .nav-item span { opacity: 1; transform: translateX(0); }
        .nav-item:hover { color: var(--accent); background: rgba(110, 203, 255, 0.05); }
        .nav-item.active { color: #030712; }
        .nav-item.active svg { stroke: #030712; }

        .sidebar-bottom { 
            width: 100%; border-top: 1px solid var(--border); 
            padding-top: 10px; display: flex; flex-direction: column; flex-shrink: 0;
        }

        .main-view { 
            flex-grow: 1; margin-left: 72px; 
            position: relative; display: flex; flex-direction: column; z-index: 1; 
        }

        .view-section {
            height: 100%; width: 100%; overflow-y: auto;
            padding: 40px 10%; display: none;
            animation: superFade 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes superFade {
            from { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* Cards & Framework Glass Panels */
        .app-card, .settings-card, .readme-modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .app-card:hover { 
            border-color: var(--accent); 
            background: rgba(110, 203, 255, 0.03);
            box-shadow: 0 0 25px var(--accent-glow);
            transform: translateY(-4px);
        }

        /* Inputs & Interactive Fields */
        textarea, input[type="text"], input[type="number"], select, .search-bar {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            transition: all 0.25s ease;
        }
        textarea:focus, input:focus, select:focus, .search-bar:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        /* Max Animation Fixed Style Code Block */
        .version-detail-body pre { 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); 
            border-radius: 8px;
            padding: 14px;
            overflow-x: auto;
            margin: 12px 0;
            position: relative;
        }
        .version-detail-body pre::before {
            content: 'CODE';
            position: absolute; top: 0; right: 12px;
            font-size: 0.65rem; color: var(--accent);
            opacity: 0.5; letter-spacing: 1px;
        }

        /* Scrollbars Styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
