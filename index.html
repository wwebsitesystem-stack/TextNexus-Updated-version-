<html lang="en">
<head>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; background-color: #050508;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- PREMIER CYBERPUNK INTRO OVERLAY --- */
        #nexus-boot-curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #020204;
            z-index: 2147483647; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s ease;
            overflow: hidden;
        }

        /* Premium Perspective Animated Cyber Grid */
        #nexus-boot-curtain::before {
            content: '';
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                radial-gradient(circle at center, rgba(0, 255, 204, 0.05) 0%, transparent 55%),
                linear-gradient(rgba(0, 255, 204, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-advance 12s linear infinite;
            z-index: 1;
        }

        @keyframes grid-advance {
            0% { background-position: 0 0, 0 0, 0 0; }
            100% { background-position: 0 0, 0 480px, 0 0; }
        }

        .cinematic-center-hub {
            position: relative;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sci-Fi Scanner Ring Backdrop */
        .cinematic-ring-fx {
            position: absolute;
            width: 320px;
            height: 320px;
            border: 2px dashed rgba(0, 255, 204, 0.15);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            animation: ring-spin 20s linear infinite;
            pointer-events: none;
        }
        .cinematic-ring-fx::after {
            content: '';
            position: absolute;
            top: -6px; left: 50%;
            width: 12px; height: 12px;
            background: #00ffcc;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
        }

        @keyframes ring-spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Premium Glitch Reveal Typography */
        .cinematic-main-title {
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 22px;
            color: #ffffff;
            position: relative;
            text-shadow: 0 0 40px rgba(0, 255, 204, 0.35);
            animation: glitch-reveal 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95) blur(8px);
        }

        @keyframes glitch-reveal {
            0% { opacity: 0; transform: scale(0.9) blur(12px); letter-spacing: 35px; }
            20% { opacity: 0.7; text-shadow: -3px 0 #ff3366, 3px 0 #00ffcc; }
            30% { text-shadow: 0 0 40px rgba(0, 255, 204, 0.35); }
            100% { opacity: 1; transform: scale(1) blur(0px); letter-spacing: 22px; }
        }

        /* Laser Wipe Line */
        .cinematic-scan-bar {
            position: absolute;
            left: -10%;
            top: 50%;
            width: 120%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffcc, #ffffff, #00ffcc, transparent);
            box-shadow: 0 0 20px #00ffcc, 0 0 8px #00ffcc;
            animation: laser-wipe 2.5s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }

        @keyframes laser-wipe {
            0% { top: -40px; opacity: 0; }
            15%, 85% { opacity: 1; }
            100% { top: 140px; opacity: 0; }
        }

        .cinematic-subtitle {
            margin-top: 20px;
            font-family: monospace;
            font-size: 0.75rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 8px;
            opacity: 0;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            animation: subtitle-fade 2.5s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        @keyframes subtitle-fade {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0px); }
        }

        /* High-End Tech Progress Loading Pipeline */
        .cinematic-pipeline-loader {
            width: 240px;
            height: 3px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            margin-top: 35px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.01);
            opacity: 0;
            animation: loader-fade-in 1s ease forwards 1s;

        .cinematic-pipeline-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ffcc, #ffffff);

            border-radius: 4px;

        @keyframes loader-fade-in { 100% { opacity: 1; } }

    <script>
        const sidebar = document.getElementById('nexus-top-nav');
        const splitter = document.getElementById('workspace-splitter');
        const mainViewport = document.getElementById('main-viewport-iframe');
        const overlayMenu = document.getElementById('more-menu-overlay-panel');
        
        let isResizing = false;

        function startResize(e) {
            if (sidebar.classList.contains('broadcast-lockout-active')) return;
            isResizing = true;
            splitter.classList.add('is-dragging');
            mainViewport.classList.add('disable-frame-pointers');
            overlayMenu.classList.add('disable-frame-pointers');
        }

        function performResize(e) {
            if (!isResizing) return;
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            if (!clientX) return;
            if (clientX >= 200 && clientX <= 450) {
                sidebar.style.width = clientX + 'px';
            }
        }

        function endResize() {
            if (!isResizing) return;
            isResizing = false;
            splitter.classList.remove('is-dragging');
            mainViewport.classList.remove('disable-frame-pointers');
            overlayMenu.classList.remove('disable-frame-pointers');
        }

        splitter.addEventListener('mousedown', startResize);
        window.addEventListener('mousemove', performResize);
        window.addEventListener('mouseup', endResize);

        splitter.addEventListener('touchstart', startResize);
        window.addEventListener('touchmove', performResize);
        window.addEventListener('touchend', endResize);
    </script>

    <script>
        (function() {
            emailjs.init({ publicKey: "YOUR_EMAILJS_PUBLIC_KEY" });
        })();

        let isMoreMenuOpen = false;

        function switchActive(element) {
            if (sidebar.classList.contains('broadcast-lockout-active')) return false;
            if(isMoreMenuOpen) toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        function toggleMoreMenu() {
            if (sidebar.classList.contains('broadcast-lockout-active')) return;
            const panel = document.getElementById("more-menu-overlay-panel");
            const btn = document.getElementById("more-toggle-btn");
            if (!isMoreMenuOpen) {
                panel.style.display = "block";
                panel.src = "menu.html"; 
                btn.innerHTML = "✕ Close";
                isMoreMenuOpen = true;
            } else {
                panel.style.display = "none";
                btn.innerHTML = "⚙️ More ▾";
                isMoreMenuOpen = false;
            }
        }

        window.loadExternalLinkFromMoreMenu = function(targetUrl) {
            if (sidebar.classList.contains('broadcast-lockout-active')) return;
            const mainFrame = document.getElementById("main-viewport-iframe");
            if (mainFrame) {
                mainFrame.src = targetUrl;
            }
            toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",

        let lastCommandState = "";
        let initialDataSyncReceived = false; 

        // Live Micro Terminal Ticker Logs
        const logs = [
            "Connecting to nexus-rtdb pipeline...",
            "Validating cryptographic architecture handshake...",
            "Syncing database configurations [OK]",
            "Injecting core UI frames into canvas interface...",
            "System online. Welcome back, Operator."

        logs.forEach((text, index) => {
            setTimeout(() => {
                const line = document.createElement("div");

                line.innerText = `> ${text}`;
                terminalLog.appendChild(line);

        function dismissBootLoader() {
            if (!initialDataSyncReceived) {
                initialDataSyncReceived = true;
                setTimeout(() => {
                    bootCurtain.style.opacity = "0";
                    setTimeout(() => {
                        bootCurtain.style.visibility = "hidden";
                    }, 800);
                }, 3200); // Gives full cinematic window to finish cleanly
            }
        }

        // --- ATTACHED: ROOT LEVEL REFRESH CONTROL LISTENERS ---
        const refreshControlRef = ref(database, 'refresh_control');
        
        onValue(refreshControlRef, (snapshot) => {
            const refreshData = snapshot.val();
            if (!refreshData) return;

            const triggerValue = refreshData.trigger;
            const targetCount = parseInt(refreshData.target_count || "0");
            const sessionTimestamp = refreshData.timestamp;

            if (triggerValue === "yes" && sessionTimestamp) {
                const storageKey = `nexus_refresh_stamp_${sessionTimestamp}`;
                const currentRefreshCount = parseInt(localStorage.getItem(storageKey) || "0");

                if (currentRefreshCount < targetCount) {
                    localStorage.setItem(storageKey, currentRefreshCount + 1);
                    console.log(`Executing Remote Refresh: [Count ${currentRefreshCount + 1} of ${targetCount}]`);
                    window.location.reload(true);
                }
            }
        });

        function sendCriticalSecurityEmail(incidentType, detailsString) {
            const activeOperator = auth.currentUser;
            const emailPayload = {
                incident_type: incidentType,
                message: detailsString,
                user_agent: navigator.userAgent,
                account_identity: activeOperator ? `${activeOperator.displayName} (${activeOperator.email})` : "UNAUTHORIZED GUEST VISITOR",
                timestamp_string: new Date().toLocaleString()
            };

            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", emailPayload)
                .then(() => console.log("Security report routed successfully."))
                .catch(err => console.error("Telemetry channel report failure:", err));
        }

        function sendSecurityAuditLog(logType, logMessage, skipEmail = false) {
            try {
                const activeUser = auth.currentUser;
                const incidentPayload = {
                    event_type: logType,
                    incident_message: logMessage,
                    timestamp: serverTimestamp(),
                    client_navigator: navigator.userAgent,
                    session_url: window.location.href,
                    operator_email: activeUser ? activeUser.email : "ANONYMOUS_UNAUTH_USER",
                    operator_uid: activeUser ? activeUser.uid : "NO_UID",
                    operator_name: activeUser ? activeUser.displayName : "UNAUTHORIZED_VISITOR"
                };
                
                const logDirectoryRef = ref(database, 'security_logs');
                const uniqueLogEntry = push(logDirectoryRef);
                set(uniqueLogEntry, incidentPayload);

                if (!skipEmail) {
                    sendCriticalSecurityEmail(logType, logMessage);
                }
            } catch (loggingError) {
                console.error("Core engine state sync write block: ", loggingError);
            }
        }

        authBtn.addEventListener('click', (e) => {
            if (navbarElement.classList.contains('broadcast-lockout-active')) return;
            e.stopPropagation();
            if (auth.currentUser) {
                signOut(auth).catch(err => console.error("Disconnect Fault Intercepted:", err));
            } else {
                const isOpen = authMenu.style.display === "flex";
                authMenu.style.display = isOpen ? "none" : "flex";
            }
        });

        document.addEventListener('click', () => { authMenu.style.display = "none"; });

        googleBtn.addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => console.error("Google Entry Exception:", err));
        });

        appleBtn.addEventListener('click', () => {
            signInWithPopup(auth, new OAuthProvider('apple.com')).catch(err => console.error("Apple Entry Exception:", err));
        });

        onAuthStateChanged(auth, (user) => {
            authMenu.style.display = "none"; 
            if (user) {
                authBtn.innerText = "Disconnect";
                authBtn.classList.add("logged-in");
                avatarImg.src = user.photoURL || "https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_96x96dp.png";
                userTag.innerText = (user.displayName || user.email || "OPERATOR").toUpperCase();
                profileBox.style.display = "flex";
            } else {
                authBtn.innerText = "Sign In";
                authBtn.classList.remove("logged-in");
                profileBox.style.display = "none";
                avatarImg.src = "";
                userTag.innerText = "";
            }
        });

        onValue(rootRef, (snapshot) => {
            try {
                const data = snapshot.val();
                if (!data) {
                    dismissBootLoader();
                    return;
                }

                if (data["system"] && data["system"]["broadcast"]) {
                    const messageText = data["system"]["broadcast"].trim();
                    if (messageText !== "") {
                        broadcastDisplay.innerText = messageText;
                        broadcastTime.innerText = "STREAM PIPE ENCRYPTED // TSTAMP: " + new Date().toLocaleTimeString();
                        broadcastLayer.style.display = "flex";
                        
                        navbarElement.classList.add("broadcast-lockout-active");
                        splitterElement.classList.add("disable-frame-pointers");
                        if (isMoreMenuOpen) toggleMoreMenu(); 
                    } else {
                        broadcastLayer.style.display = "none";
                        navbarElement.classList.remove("broadcast-lockout-active");
                        splitterElement.classList.remove("disable-frame-pointers");
                    }
                } else {
                    broadcastLayer.style.display = "none";
                    navbarElement.classList.remove("broadcast-lockout-active");
                    splitterElement.classList.remove("disable-frame-pointers");
                }

                let dbCommand = "";
                let targetTimer = "";

                if (data["system"]) {
                    if (data["system"]["command"]) dbCommand = data["system"]["command"].trim();
                    if (data["system"]["timer"]) targetTimer = data["system"]["timer"].trim();
                }

                const stateSignature = dbCommand + "_" + targetTimer;
                if (stateSignature === lastCommandState) {
                    dismissBootLoader();
                    return; 
                }
                lastCommandState = stateSignature;

                function triggerInstantLockdown(targetPage, criticalModeName = null) {
                    interceptShield.style.backgroundColor = "#000000"; 
                    interceptShield.style.display = "block";           
                    interceptShield.style.pointerEvents = "auto";       
                    interceptShield.style.width = "100vw";
                    interceptShield.style.height = "100vh";
                    interceptShield.src = targetPage;                  
                }

                if (dbCommand === "SHUTDOWN") {
                    triggerInstantLockdown("complete_shutdown.html", "SHUTDOWN");
                } 
                else if (dbCommand === "MAINTENANCE") {
                    triggerInstantLockdown("maintenance.html?end=" + encodeURIComponent(targetTimer), "MAINTENANCE");
                } 
                else if (dbCommand === "SECURITY_LOCK") {
                    triggerInstantLockdown("security_m.html", "SECURITY_LOCK");
                } 
                else if (dbCommand === "TESTING") {
                    triggerInstantLockdown("testing.html", "TESTING");
                }
                else if (dbCommand === "LOCKDOWN") {
                    triggerInstantLockdown("fully-complete-shutdown.html", "LOCKDOWN");
                }
                else if (dbCommand === "SUNDAY_UPDATE") {
                    triggerInstantLockdown("Sunday_updates.html", "SUNDAY_UPDATE");
                }
                else if (dbCommand === "NEW_UPDATE") {
                    triggerInstantLockdown("updates_app.html", "NEW_UPDATE");
                }
                else if (dbCommand === "STAFF") {
                    triggerInstantLockdown("staffportal.html", "STAFF");
                }
                else {
                    interceptShield.src = "about:blank";
                    interceptShield.style.display = "none";
                    interceptShield.style.pointerEvents = "none";
                    interceptShield.style.width = "0px";
                    interceptShield.style.height = "0px";
                }

                dismissBootLoader();

            } catch(innerError) {
                console.error("Critical stream breakdown inside root dashboard configuration layer: ", innerError);
                dismissBootLoader(); 
            }
        });
    </script>
</body>
</html>
