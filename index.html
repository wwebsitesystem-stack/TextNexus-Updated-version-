<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | Global Command</title>
    <style>
        :root { --nexus-blue: #00e5ff; --nexus-dark: #020202; --text-main: #ffffff; }
        body { background-color: var(--nexus-dark); overflow: hidden; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        
        header { 
            position: relative; margin: 20px auto; width: 90%; max-width: 1200px;
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: rgba(10,10,15,0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; z-index: 1000;
        }
        
        .logo { font-weight: 800; letter-spacing: 3px; color: var(--text-main); text-transform: uppercase; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a { 
            text-decoration: none; color: #888; font-size: 11px; font-weight: 600;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        nav ul li a:hover, nav ul li a.active { color: var(--nexus-blue); }

        .frame-container { flex-grow: 1; width: 100%; }
        #nexusFrame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexus</div>
        <nav>
            <ul>
                <li><a href="home.html" target="nexus-window" class="nav-link active" onclick="updateNav(this)">Home</a></li>
                <li><a href="ghostlink.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">Ghost Link</a></li>
                <li><a href="hand_tracking.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">AI Core</a></li>
                <li><a href="security.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">Security</a></li>
                <li><a href="website_information.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">About</a></li>
                <li><a href="credits.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">Credits</a></li>
            </ul>
        </nav>
    </header>

    <div class="frame-container">
        <iframe name="nexus-window" src="home.html" id="nexusFrame"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const frame = document.getElementById('nexusFrame');

        // Watch for status changes in Firebase using the 'System' path
        onValue(ref(db, 'System'), (snapshot) => {
            const status = snapshot.val();
            
            // Map status keys to the correct files
            const statusPages = {
                "SHUTDOWN": "complete_shutdown.html",
                "MAINTENANCE": "maintenance.html",
                "SECURITY": "security_m.html", // Updated to security_m.html
                "TESTING": "testing.html"
            };

            // If the status matches one of our keys, switch the iframe
            if (statusPages[status]) {
                frame.src = statusPages[status];
            } else if (status === "ONLINE") {
                // If it returns to ONLINE, go back to home
                frame.src = "home.html";
            }
        });
    </script>

    <script>
        function updateNav(clickedLink) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            clickedLink.classList.add('active');
        }
    </script>
</body>
</html>
