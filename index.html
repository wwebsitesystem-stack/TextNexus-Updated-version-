<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Global Command</title>
    <style>
        :root { 
            --nexus-blue: #00e5ff; 
            --nexus-blue-glow: rgba(0, 229, 255, 0.4);
            --nexus-dark: #050508; 
            --nexus-card: rgba(10, 11, 18, 0.75);
            --text-main: #ffffff; 
            --text-muted: #707585;
            --font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Full Viewport Lock & Cyber Grid Background */
        body { 
            background-color: var(--nexus-dark); 
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        /* Sleek Modern Header */
        header { 
            position: relative; 
            margin: 20px 24px 15px 24px; 
            flex-shrink: 0; 
            height: 64px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 0 30px; 
            background: var(--nexus-card); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 225, 255, 0.15); 
            border-radius: 16px; 
            z-index: 1000;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(0, 225, 255, 0.05);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo { 
            font-weight: 900; 
            letter-spacing: 4px; 
            color: var(--text-main); 
            text-transform: uppercase; 
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
            color: var(--nexus-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--nexus-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--nexus-blue);
            animation: pulse 2s infinite;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav ul { display: flex; list-style: none; gap: 4px; margin: 0; padding: 0; }
        
        nav ul li a { 
            text-decoration: none; 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600;
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            cursor: pointer; 
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        nav ul li a:hover { 
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
        }

        nav ul li a.active { 
            color: var(--nexus-blue); 
            background: rgba(0, 229, 255, 0.05);
            border-color: rgba(0, 229, 255, 0.25);
            text-shadow: 0 0 8px var(--nexus-blue-glow);
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.03);
        }

        nav ul li a.owner-link { color: #ffaa00; }
        nav ul li a.owner-link:hover { background: rgba(255, 170, 0, 0.05); border-color: rgba(255, 170, 0, 0.2); color: #ffcc66; }
        nav ul li a.owner-link.active { color: #ffaa00; background: rgba(255, 170, 0, 0.08); border-color: rgba(255, 170, 0, 0.4); text-shadow: 0 0 8px rgba(255, 170, 0, 0.4); }

        /* Auth UI Elements */
        .auth-module { display: flex; align-items: center; }
        .btn-auth {
            background: transparent; color: var(--nexus-blue); border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 8px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; border-radius: 8px; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-auth:hover { background: rgba(0, 229, 255, 0.1); box-shadow: 0 0 15px var(--nexus-blue-glow); }

        .user-profile {
            display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.03);
            padding: 4px 6px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.08); cursor: pointer;
            transition: border-color 0.3s ease;
        }
        .user-profile:hover { border-color: var(--nexus-blue); }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--nexus-blue); object-fit: cover; }

        /* Techy Modal Panels (Auth & Settings) */
        .cyber-modal {
            position: fixed; top: 100px; right: 24px; width: 320px;
            background: rgba(10, 11, 18, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 16px; padding: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(0, 229, 255, 0.05);
            z-index: 2000; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-20px); opacity: 0; pointer-events: none;
        }
        .cyber-modal.open { transform: translateY(0); opacity: 1; pointer-events: all; }
        .modal-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input { 
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px; border-radius: 6px; color: var(--text-main); font-size: 12px; transition: all 0.3s ease;
        }
        .form-group input:focus { border-color: var(--nexus-blue); outline: none; background: rgba(0, 229, 255, 0.02); }
        
        .modal-btn {
            width: 100%; background: rgba(0, 229, 255, 0.1); border: 1px solid var(--nexus-blue); color: var(--nexus-blue);
            padding: 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s ease; margin-top: 8px;
        }
        .modal-btn:hover { background: var(--nexus-blue); color: var(--nexus-dark); box-shadow: 0 0 15px var(--nexus-blue-glow); }
        .modal-btn.secondary { background: transparent; border-color: rgba(255,255,255,0.1); color: var(--text-muted); margin-top: 4px;}
        .modal-btn.secondary:hover { color: var(--text-main); border-color: var(--text-main); }
        .modal-btn.danger { border-color: #ff4a4a; color: #ff4a4a; background: transparent; }
        .modal-btn.danger:hover { background: #ff4a4a; color: var(--text-main); box-shadow: none; }
        
        .toggle-auth-mode { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 12px; cursor: pointer; }
        .toggle-auth-mode span { color: var(--nexus-blue); text-decoration: underline; }

        /* Frame Containers */
        .frame-container { 
            flex-grow: 1; width: calc(100% - 48px); margin: 0 24px 24px 24px; position: relative; 
            border-radius: 16px; overflow: hidden; border: 1px solid rgba(0, 229, 255, 0.15); 
            background: rgba(3, 4, 7, 0.6); box-shadow: 0 24px 70px rgba(0,0,0,0.8);
        }
        #nexusFrame { width: 100%; height: 100%; border: none; background: transparent; display: block; }
        .frame-loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--nexus-dark); display: flex; justify-content: center; align-items: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .frame-loader.loading { opacity: 0.96; pointer-events: all; }
        .spinner { width: 44px; height: 44px; border: 2px solid rgba(0, 229, 255, 0.1); border-top: 2px solid var(--nexus-blue); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 229, 255, 0); } 100% { transform: scale(0.95); opacity: 0.5; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="logo">Nexus</div>
            <div class="status-pill">
                <div class="status-dot"></div>
                <span id="system-status-text">Core Node: Live</span>
            </div>
        </div>
        
        <div class="nav-container">
            <nav>
                <ul id="navigationMenu">
                    <li><a href="home.html" target="nexus-window" class="nav-link active">Home</a></li>
                    <li><a href="ghostlink.html" target="nexus-window" class="nav-link">Ghost Link</a></li>
                    <li><a href="TextNexus.html" target="nexus-window" class="nav-link">TextNexus</a></li>
                    <li><a href="hand_tracking.html" target="nexus-window" class="nav-link">AI Core</a></li>
                    <li><a href="security.html" target="nexus-window" class="nav-link">Security</a></li>
                    <li><a href="bible-verse-of-the-day.html" target="nexus-window" class="nav-link">Verse of the Day</a></li>
                    <li><a href="website_information.html" target="nexus-window" class="nav-link">About</a></li>
                    <li><a href="credits.html" target="nexus-window" class="nav-link">Credits</a></li>
                    <li id="ownerTab" class="hidden"><a href="owner-panel.html" target="nexus-window" class="nav-link owner-link">Owner Panel</a></li>
                </ul>
            </nav>

            <div class="auth-module">
                <button id="btnOpenAuth" class="btn-auth">Access Node</button>
                <div id="userProfile" class="user-profile hidden">
                    <img id="userImg" class="user-avatar" src="" alt="User Identity">
                </div>
            </div>
        </div>
    </header>

    <div id="authModal" class="cyber-modal">
        <div id="modalTitle" class="modal-title">Authorized Entry</div>
        <form id="authForm">
            <div class="form-group hidden" id="groupUsername">
                <label>Callsign / Username</label>
                <input type="text" id="authUsername" placeholder="e.g., Operator-Alpha">
            </div>
            <div class="form-group">
                <label>Node Email Address</label>
                <input type="email" id="authEmail" required placeholder="name@domain.com">
            </div>
            <div class="form-group">
                <label>Access Encryption / Password</label>
                <input type="password" id="authPassword" required placeholder="••••••••">
            </div>
            <button type="submit" id="btnSubmitAuth" class="modal-btn">Initialize Connection</button>
            <button type="button" id="btnGoogleAuth" class="modal-btn secondary">Google Validation Pipeline</button>
        </form>
        <div class="toggle-auth-mode" id="toggleAuthMode">New terminal asset? <span>Register Account</span></div>
    </div>

    <div id="settingsModal" class="cyber-modal">
        <div class="modal-title">Identity Config Matrix</div>
        <div class="form-group">
            <label>Update Username</label>
            <input type="text" id="settingsUsername" placeholder="New Callsign">
        </div>
        <div class="form-group">
            <label>Update Avatar Link (URL)</label>
            <input type="url" id="settingsAvatar" placeholder="https://image-path.com/avatar.png">
        </div>
        <div class="form-group">
            <label>Modify Node Email</label>
            <input type="email" id="settingsEmail" placeholder="New Email Contact">
        </div>
        <div class="form-group">
            <label>Rotate Encryption Key (Password)</label>
            <input type="password" id="settingsPassword" placeholder="New Password Sequence">
        </div>
        <button id="btnSaveSettings" class="modal-btn">Commit Mutations</button>
        <button id="btnSignOut" class="modal-btn danger">Terminate Session</button>
    </div>

    <div class="frame-container">
        <div class="frame-loader" id="frameLoader"><div class="spinner"></div></div>
        <iframe name="nexus-window" src="home.html" id="nexusFrame"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306",
            measurementId: "G-S6K1M5PZLE"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const frame = document.getElementById('nexusFrame');
        const statusText = document.getElementById('system-status-text');
        const ownerTab = document.getElementById('ownerTab');
        
        // Modal & Control Selectors
        const authModal = document.getElementById('authModal');
        const settingsModal = document.getElementById('settingsModal');
        const btnOpenAuth = document.getElementById('btnOpenAuth');
        const userProfile = document.getElementById('userProfile');
        const userImg = document.getElementById('userImg');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const groupUsername = document.getElementById('groupUsername');
        const modalTitle = document.getElementById('modalTitle');
        const btnSubmitAuth = document.getElementById('btnSubmitAuth');
        const authForm = document.getElementById('authForm');
        
        let isSignUpMode = false;

        // Toggle Open Modals
        btnOpenAuth.addEventListener('click', () => {
            settingsModal.classList.remove('open');
            authModal.classList.toggle('open');
        });
        userProfile.addEventListener('click', () => {
            authModal.classList.remove('open');
            settingsModal.classList.toggle('open');
        });

        // Switch Mode Between Sign In & Sign Up
        toggleAuthMode.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            if (isSignUpMode) {
                modalTitle.innerText = "Register Asset Profile";
                groupUsername.classList.remove('hidden');
                btnSubmitAuth.innerText = "Provision Identity Matrix";
                toggleAuthMode.innerHTML = "Already validated? <span>Connect Node</span>";
            } else {
                modalTitle.innerText = "Authorized Entry";
                groupUsername.classList.add('hidden');
                btnSubmitAuth.innerText = "Initialize Connection";
                toggleAuthMode.innerHTML = "New terminal asset? <span>Register Account</span>";
            }
        });

        // Handle Email Authentication Framework
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const username = document.getElementById('authUsername').value;

            if (isSignUpMode) {
                createUserWithEmailAndPassword(auth, email, password)
                    .then((credential) => {
                        updateProfile(credential.user, { displayName: username, photoURL: "https://i.imgur.com/6VB8Hz0.png" })
                            .then(() => location.reload());
                    }).catch(err => alert("Registration failure: " + err.message));
            } else {
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => authModal.classList.remove('open'))
                    .catch(err => alert("Authentication failure: " + err.message));
            }
        });

        // Google Authentication fallback module
        document.getElementById('btnGoogleAuth').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(() => authModal.classList.remove('open')).catch(err => alert(err.message));
        });

        // Disconnect Routine
        document.getElementById('btnSignOut').addEventListener('click', () => {
            signOut(auth).then(() => settingsModal.classList.remove('open'));
        });

        // Commit Account Modifications Flow
        document.getElementById('btnSaveSettings').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return;

            const newName = document.getElementById('settingsUsername').value;
            const newPic = document.getElementById('settingsAvatar').value;
            const newEmail = document.getElementById('settingsEmail').value;
            const newPass = document.getElementById('settingsPassword').value;

            try {
                if (newName || newPic) {
                    await updateProfile(user, {
                        displayName: newName || user.displayName,
                        photoURL: newPic || user.photoURL
                    });
                }
                if (newEmail) await updateEmail(user, newEmail);
                if (newPass) await updatePassword(user, newPass);
                
                alert("Mutations successfully recorded to local profile block.");
                location.reload();
            } catch (err) {
                alert("Security mutation rejection: " + err.message);
            }
        });

        // Watch Identity State Modifications
        onAuthStateChanged(auth, (user) => {
            if (user) {
                btnOpenAuth.classList.add('hidden');
                userProfile.classList.remove('hidden');
                userImg.src = user.photoURL || "https://i.imgur.com/6VB8Hz0.png";
                
                // Prefill settings form
                document.getElementById('settingsUsername').value = user.displayName || "";
                document.getElementById('settingsAvatar').value = user.photoURL || "";
                document.getElementById('settingsEmail').value = user.email || "";

                if (user.email && user.email.toLowerCase() === "brodywilliams0226@gmail.com") {
                    ownerTab.classList.remove('hidden');
                    bindNavigationEvents();
                } else {
                    ownerTab.classList.add('hidden');
                }
            } else {
                userProfile.classList.add('hidden');
                btnOpenAuth.classList.remove('hidden');
                ownerTab.classList.add('hidden');
            }
        });

        // Global System Stream Watcher
        onValue(ref(db, 'System'), (snapshot) => {
            const status = snapshot.val();
            const statusPages = {
                "SHUTDOWN": "complete_shutdown.html",
                "MAINTENANCE": "maintenance.html",
                "SECURITY": "security_m.html",
                "TESTING": "testing.html"
            };
            if (statusPages[status]) {
                frame.src = statusPages[status];
                statusText.innerText = `SYS STATUS: ${status}`;
            } else if (status === "ONLINE") {
                frame.src = "home.html";
                statusText.innerText = "Core Node: Live";
            }
        });
    </script>

    <script>
        function bindNavigationEvents() {
            const links = document.querySelectorAll('.nav-link');
            const loader = document.getElementById('frameLoader');

            links.forEach(link => {
                const newLink = link.cloneNode(true);
                link.parentNode.replaceChild(newLink, link);
            });

            const updatedLinks = document.querySelectorAll('.nav-link');
            updatedLinks.forEach(link => {
                link.addEventListener('click', () => {
                    updatedLinks.forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    loader.classList.add('loading');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const frame = document.getElementById('nexusFrame');
            const loader = document.getElementById('frameLoader');
            
            bindNavigationEvents();
            frame.addEventListener('load', () => loader.classList.remove('loading'));
        });
    </script>
</body>
</html>
