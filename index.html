<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform Core // v3.3.6</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; background-color: #050508;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Master Container Layout */
        .dashboard-container { 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            position: absolute;
            top: 0;
            left: 0;
            background: #050508;
        }

        /* --- SIDE NAVIGATION COMMAND DECK --- */
        .side-navbar {
            display: flex;
            flex-direction: column;
            width: 280px; 
            min-width: 200px;
            max-width: 450px;
            background: linear-gradient(180deg, rgba(9, 9, 14, 0.95) 0%, rgba(5, 5, 8, 0.98) 100%);
            border-right: 1px solid rgba(0, 255, 204, 0.1);
            padding: 24px;
            justify-content: space-between;
            position: relative; 
            z-index: 100000;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            transition: border-color 0.4s ease, background 0.4s ease, opacity 0.3s ease;
            flex-shrink: 0;
        }

        .side-navbar.code-red-alert {
            border-right: 2px solid #ff3366 !important;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.2);
            background: linear-gradient(180deg, rgba(20, 4, 8, 0.98) 0%, rgba(10, 2, 4, 0.99) 100%);
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 30px;
        }

        .brand-logo { 
            color: #ffffff; 
            font-size: 1.4rem; 
            font-weight: 900; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            white-space: nowrap;
        }
        
        .version-tag { 
            font-family: monospace; 
            font-size: 0.65rem; 
            color: #00ffcc; 
            background: rgba(0, 255, 204, 0.06);
            border: 1px solid rgba(0, 255, 204, 0.25); 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-links { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            flex-grow: 1;
            margin-top: 10px;
            overflow-y: auto;
        }
        
        .nav-btn {
            color: #8a8a9e; 
            text-decoration: none; 
            font-size: 0.75rem; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            padding: 12px 16px;
            border-radius: 8px; 
            cursor: pointer; 
            background: transparent; 
            border: 1px solid transparent; 
            outline: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
            white-space: nowrap;
        }
        
        .nav-btn:hover { 
            color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateX(3px);
        }
        
        .nav-btn.active-tab { 
            color: #00ffcc; 
            background: rgba(0, 255, 204, 0.06); 
            border: 1px solid rgba(0, 255, 204, 0.15);
            box-shadow: inset 0 0 12px rgba(0, 255, 204, 0.05);
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }
        
        /* --- RESIZABLE DRAG HANDLE LINE --- */
        .resize-divider {
            width: 6px;
            cursor: col-resize;
            background: transparent;
            position: relative;
            z-index: 100005;
            flex-shrink: 0;
            transition: background 0.2s ease;
        }
        .resize-divider:hover, .resize-divider.is-dragging {
            background: rgba(0, 255, 204, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
        }

        /* --- AUTH ZONE --- */
        .auth-footer-zone {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 20px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .user-profile-box {
            display: none;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 14px;
            border-radius: 12px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #00ffcc;
            object-fit: cover;
        }

        .user-profile-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-profile-tag {
            font-family: monospace;
            font-size: 0.7rem;
            color: #ffffff;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status-text {
            font-size: 0.6rem;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-btn {
            width: 100%;
            background: rgba(255, 51, 102, 0.05);
            color: #ff3366;
            border: 1px solid rgba(255, 51, 102, 0.2);
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }

        .auth-btn:hover {
            background: #ff3366;
            color: #ffffff;
            border-color: #ff3366;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
        }

        .auth-btn.logged-in {
            color: #8a8a9e;
            background: rgba(138, 138, 158, 0.05);
            border: 1px solid rgba(138, 138, 158, 0.15);
        }

        .auth-dropdown {
            display: none;
            flex-direction: column;
            position: absolute;
            bottom: calc(100% + 10px);
            left: 0;
            right: 0;
            background: #0c0c14;
            border: 1px solid rgba(0, 255, 204, 0.15);
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
            z-index: 100002;
        }

        .dropdown-item {
            background: transparent;
            border: none;
            color: #8a8a9e;
            font-family: monospace;
            font-size: 0.7rem;
            text-align: left;
            padding: 12px;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
        }

        .dropdown-item:hover {
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.05);
        }

        /* --- MAIN VIEWPORT INTERIOR CANVAS --- */
        .iframe-workspace { 
            flex-grow: 1;
            height: 100%; 
            position: relative; 
            background: #020204; 
            z-index: 1;
            padding: 16px; 
            overflow: hidden;
        }

        .app-view-frame { 
            width: 100%; 
            height: 100%; 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            display: block; 
            background: #020204; 
            border-radius: 16px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Input Lock State Classes */
        .disable-frame-pointers {
            pointer-events: none !important;
        }

        /* NEW: Complete structural input bypass lock during active broadcasts */
        .broadcast-lockout-active {
            pointer-events: none !important;
            opacity: 0.4; /* Visually dims navigation components during broadcasts */
            cursor: not-allowed !important;
        }
        
        #more-menu-overlay-panel { 
            position: absolute; 
            top: 16px; 
            left: 16px; 
            width: calc(100% - 32px); 
            height: calc(100% - 32px);
            z-index: 9999; 
            display: none; 
            background: #020204; 
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }

        /* --- BROADCAST COMMAND OVERLAY --- */
        .fullscreen-broadcast-screen {
            position: fixed; /* Layer fixed over whole screen canvas area */
            top: 16px; left: 16px; width: calc(100% - 32px); height: calc(100% - 32px);
            background-color: #030307; 
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.02) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 255, 204, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 204, 0.15);
            z-index: 200000; /* Positions higher than standard navigation deck views */
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
            pointer-events: auto !important; /* Ensure content inside broadcast remains focusable if needed */
        }

        .broadcast-status-indicator {
            display: inline-flex; align-items: center; gap: 10px; font-family: monospace;
            font-size: 0.75rem; font-weight: 700; color: #00ffcc; text-transform: uppercase;
            letter-spacing: 3px; background: rgba(0, 255, 204, 0.04); border: 1px solid rgba(0, 255, 204, 0.15);
            padding: 8px 18px; border-radius: 30px; margin-bottom: 30px;
        }

        .broadcast-pulse-dot {
            width: 8px; height: 8px; background-color: #00ffcc; border-radius: 50%;
            box-shadow: 0 0 12px #00ffcc; animation: pulse-glow 1.8s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 20px #00ffcc; }
            100% { transform: scale(0.9); opacity: 0.4; }
        }

        .broadcast-main-text {
            color: #ffffff; font-size: 3.5rem; font-weight: 900; line-height: 1.2;
            margin-bottom: 35px; font-family: monospace; text-transform: uppercase; 
            max-width: 800px; text-shadow: 0 0 40px rgba(0, 255, 204, 0.25); 
        }

        .broadcast-timestamp-footer {
            font-family: monospace; color: #3d3d4d; font-size: 0.7rem;
            letter-spacing: 2px; text-transform: uppercase;
        }

        #system-intercept-shield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 2147483647; display: none; border: none;
            pointer-events: none;
        }

        @media (max-width: 1024px) {
            .dashboard-container { flex-direction: column; }
            .side-navbar { width: 100% !important; max-width: 100%; height: 75px; flex-direction: row; border-right: none; border-top: 1px solid rgba(0, 255, 204, 0.1); padding: 12px 20px; order: 2; }
            .resize-divider { display: none; } 
            .brand-header { display: none; }
            .nav-links { flex-direction: row; justify-content: space-around; margin-top: 0; width: 100%; }
            .nav-btn { padding: 8px 12px; font-size: 0.65rem; }
            .auth-footer-zone { border-top: none; padding-top: 0; margin-top: 0; flex-direction: row; align-items: center; }
            .auth-btn { width: auto; padding: 8px 16px; }
            .user-profile-box { padding: 4px 10px; }
            .auth-dropdown { bottom: calc(100% + 15px); left: auto; right: 0; min-width: 160px; }
            .iframe-workspace { padding: 0; order: 1; }
            .app-view-frame { border-radius: 0; border: none; }
            .fullscreen-broadcast-screen { top: 0; left: 0; width: 100%; height: 100%; border-radius: 0; border: none; }
        }
    </style>
</head>
<body>

    <iframe id="system-intercept-shield" src="about:blank"></iframe>

    <div class="fullscreen-broadcast-screen" id="nexus-fullscreen-broadcast">
        <div class="broadcast-status-indicator">
            <div class="broadcast-pulse-dot"></div>
            <span>System Broadcast Active</span>
        </div>
        <div class="broadcast-main-text" id="broadcast-screen-message">Establishing connection pipeline...</div>
        <div class="broadcast-timestamp-footer" id="broadcast-screen-time">NODE_ALPHA_READY</div>
    </div>

    <div class="dashboard-container" id="master-app-wrapper">

        <aside class="side-navbar" id="nexus-top-nav">
            <div class="brand-header">
                <div class="brand-logo" id="nexus-logo">Nexus <span class="version-tag">v3.3.6</span></div>
            </div>
            
            <nav class="nav-links">
                <a href="home.html" target="nexus-main-viewport" class="nav-btn active-tab" onclick="switchActive(this)">⚡ Home</a>
                <a href="updates.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">📡 Updates</a>
                <a href="shoutout.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">🔥 Shoutouts</a>
                <a href="ghostlink.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">👻 GhostLink</a>
                <a href="security.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">🛡️ Security</a>
                <a href="all_about_the_owner.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">👑 Owner</a>
                <button id="more-toggle-btn" class="nav-btn" onclick="toggleMoreMenu()">⚙️ More ▾</button>
            </nav>

            <div class="auth-footer-zone">
                <div id="user-profile-box" class="user-profile-box">
                    <img id="user-avatar-img" class="user-avatar" src="" alt="Profile">
                    <div class="user-profile-info">
                        <span id="user-display-name" class="user-profile-tag"></span>
                        <span class="user-status-text">Operator</span>
                    </div>
                </div>
                <button id="auth-action-trigger" class="auth-btn">Sign In</button>
                
                <div id="auth-options-menu" class="auth-dropdown">
                    <button id="login-google-btn" class="dropdown-item">🌐 Google Terminal</button>
                    <button id="login-apple-btn" class="dropdown-item">🍏 Apple ID</button>
                </div>
            </div>
        </aside>

        <div class="resize-divider" id="workspace-splitter"></div>

        <main class="iframe-workspace" id="canvas-view-zone">
            <iframe src="home.html" name="nexus-main-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
            <iframe src="menu.html" id="more-menu-overlay-panel" class="app-view-frame"></iframe>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('nexus-top-nav');
        const splitter = document.getElementById('workspace-splitter');
        const mainViewport = document.getElementById('main-viewport-iframe');
        const overlayMenu = document.getElementById('more-menu-overlay-panel');
        
        let isResizing = false;

        function startResize(e) {
            // Prevent workspace resizing actions if an active layout lock is present
            if (sidebar.classList.contains('broadcast-lockout-active')) return;
            isResizing = true;
            splitter.classList.add('is-dragging');
            mainViewport.classList.add('disable-frame-pointers');
            overlayMenu.classList.add('disable-frame-pointers');
        }

        function performResize(e) {
            if (!isResizing) return;
            let clientX = e.clientX || (e.touches && e.touches[0].clientX);
            if (!clientX) return;
            if (clientX >= 200 && clientX <= 450) {
                sidebar.style.width = clientX + 'px';
            }
        }

        function endResize() {
            if (!isResizing) return;
            isResizing = false;
            splitter.classList.remove('is-dragging');
            mainViewport.classList.remove('disable-frame-pointers');
            overlayMenu.classList.remove('disable-frame-pointers');
        }

        splitter.addEventListener('mousedown', startResize);
        window.addEventListener('mousemove', performResize);
        window.addEventListener('mouseup', endResize);

        splitter.addEventListener('touchstart', startResize);
        window.addEventListener('touchmove', performResize);
        window.addEventListener('touchend', endResize);
    </script>

    <script>
        (function() {
            emailjs.init({ publicKey: "YOUR_EMAILJS_PUBLIC_KEY" });
        })();

        let isMoreMenuOpen = false;

        // Prevent tab switches if menu navigation is locked down
         Zion
        function switchActive(element) {
            if (sidebar.classList.contains('broadcast-lockout-active')) return false;
            if(isMoreMenuOpen) toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        function toggleMoreMenu() {
            if (sidebar.classList.contains('broadcast-lockout-active')) return;
            const panel = document.getElementById("more-menu-overlay-panel");
            const btn = document.getElementById("more-toggle-btn");
            if (!isMoreMenuOpen) {
                panel.style.display = "block";
                panel.src = "menu.html"; 
                btn.innerHTML = "✕ Close";
                isMoreMenuOpen = true;
            } else {
                panel.style.display = "none";
                btn.innerHTML = "⚙️ More ▾";
                isMoreMenuOpen = false;
            }
        }

        window.loadExternalLinkFromMoreMenu = function(targetUrl) {
            if (sidebar.classList.contains('broadcast-lockout-active')) return;
            const mainFrame = document.getElementById("main-viewport-iframe");
            if (mainFrame) {
                mainFrame.src = targetUrl;
            }
            toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, OAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        const rootRef = ref(database);

        const interceptShield = document.getElementById("system-intercept-shield");
        const navbarElement = document.getElementById("nexus-top-nav");
        const logoElement = document.getElementById("nexus-logo");
        const authBtn = document.getElementById("auth-action-trigger");
        const authMenu = document.getElementById("auth-options-menu");
        const profileBox = document.getElementById("user-profile-box");
        const avatarImg = document.getElementById("user-avatar-img");
        const userTag = document.getElementById("user-display-name");

        const googleBtn = document.getElementById("login-google-btn");
        const appleBtn = document.getElementById("login-apple-btn");

        const broadcastLayer = document.getElementById("nexus-fullscreen-broadcast");
        const broadcastDisplay = document.getElementById("broadcast-screen-message");
        const broadcastTime = document.getElementById("broadcast-screen-time");
        const splitterElement = document.getElementById("workspace-splitter");

        let lastCommandState = "";
        let isCriticalAlertActive = false;

        function sendCriticalSecurityEmail(incidentType, detailsString) {
            const activeOperator = auth.currentUser;
            const emailPayload = {
                incident_type: incidentType,
                message: detailsString,
                user_agent: navigator.userAgent,
                account_identity: activeOperator ? `${activeOperator.displayName} (${activeOperator.email})` : "UNAUTHORIZED GUEST VISITOR",
                timestamp_string: new Date().toLocaleString()
            };

            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", emailPayload)
                .then(() => console.log("Security report routed successfully."))
                .catch(err => console.error("Telemetry channel report failure:", err));
        }

        function sendSecurityAuditLog(logType, logMessage, skipEmail = false) {
            try {
                const activeUser = auth.currentUser;
                const incidentPayload = {
                    event_type: logType,
                    incident_message: logMessage,
                    timestamp: serverTimestamp(),
                    client_navigator: navigator.userAgent,
                    session_url: window.location.href,
                    operator_email: activeUser ? activeUser.email : "ANONYMOUS_UNAUTH_USER",
                    operator_uid: activeUser ? activeUser.uid : "NO_UID",
                    operator_name: activeUser ? activeUser.displayName : "UNAUTHORIZED_VISITOR"
                };
                
                const logDirectoryRef = ref(database, 'security_logs');
                const uniqueLogEntry = push(logDirectoryRef);
                set(uniqueLogEntry, incidentPayload);

                if (!skipEmail) {
                    sendCriticalSecurityEmail(logType, logMessage);
                }
            } catch (loggingError) {
                console.error("Core engine state sync write block: ", loggingError);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (isCriticalAlertActive) {
                sendSecurityAuditLog("UNLOAD_REFRESH_ATTEMPT", "User tried page close or manual browser reload during active lockdown containment.");
            }
        });

        if (performance.navigation.type === performance.navigation.TYPE_RELOAD) {
            setTimeout(() => {
                if (isCriticalAlertActive) {
                    sendSecurityAuditLog("RELOAD_POST_BREACH_INITIALIZATION", "Client stack initialized from scratch while server command node indicates high critical containment state.");
                }
            }, 1200);
        }

        authBtn.addEventListener('click', (e) => {
            if (navbarElement.classList.contains('broadcast-lockout-active')) return;
            e.stopPropagation();
            if (auth.currentUser) {
                signOut(auth).catch(err => console.error("Disconnect Fault Intercepted:", err));
            } else {
                const isOpen = authMenu.style.display === "flex";
                authMenu.style.display = isOpen ? "none" : "flex";
            }
        });

        document.addEventListener('click', () => { authMenu.style.display = "none"; });

        googleBtn.addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => console.error("Google Entry Exception:", err));
        });

        appleBtn.addEventListener('click', () => {
            signInWithPopup(auth, new OAuthProvider('apple.com')).catch(err => console.error("Apple Entry Exception:", err));
        });

        onAuthStateChanged(auth, (user) => {
            authMenu.style.display = "none"; 
            if (user) {
                authBtn.innerText = "Disconnect";
                authBtn.classList.add("logged-in");
                avatarImg.src = user.photoURL || "https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_96x96dp.png";
                userTag.innerText = (user.displayName || user.email || "OPERATOR").toUpperCase();
                profileBox.style.display = "flex";
            } else {
                authBtn.innerText = "Sign In";
                authBtn.classList.remove("logged-in");
                profileBox.style.display = "none";
                avatarImg.src = "";
                userTag.innerText = "";
            }
        });

        onValue(rootRef, (snapshot) => {
            try {
                const data = snapshot.val();
                if (!data) return;

                // --- LIVE FEED ENGINE AND NAVIGATION INTERCEPT LOCK ---
                if (data["system"] && data["system"]["broadcast"]) {
                    const messageText = data["system"]["broadcast"].trim();
                    if (messageText !== "") {
                        broadcastDisplay.innerText = messageText;
                        broadcastTime.innerText = "STREAM PIPE ENCRYPTED // TSTAMP: " + new Date().toLocaleTimeString();
                        broadcastLayer.style.display = "flex";
                        
                        // NEW: Lock out user UI interaction layers entirely
                        navbarElement.classList.add("broadcast-lockout-active");
                        splitterElement.classList.add("disable-frame-pointers");
                        if (isMoreMenuOpen) toggleMoreMenu(); // Auto-collapse drop menu safely
                    } else {
                        broadcastLayer.style.display = "none";
                        navbarElement.classList.remove("broadcast-lockout-active");
                        splitterElement.classList.remove("disable-frame-pointers");
                    }
                } else {
                    broadcastLayer.style.display = "none";
                    navbarElement.classList.remove("broadcast-lockout-active");
                    splitterElement.classList.remove("disable-frame-pointers");
                }

                let dbCommand = "";
                let targetTimer = "";

                if (data["system"]) {
                    if (data["system"]["command"]) dbCommand = data["system"]["command"].trim();
                    if (data["system"]["timer"]) targetTimer = data["system"]["timer"].trim();
                }

                const stateSignature = dbCommand + "_" + targetTimer;
                if (stateSignature === lastCommandState) return; 
                lastCommandState = stateSignature;

                function triggerInstantLockdown(targetPage, criticalModeName = null) {
                    if (criticalModeName === "LOCKDOWN" || criticalModeName === "SECURITY_LOCK" || criticalModeName === "SHUTDOWN") {
                        isCriticalAlertActive = true;
                        navbarElement.classList.add("code-red-alert");
                        if (logoElement) {
                            logoElement.innerHTML = `⚠️ ALERT <span class="version-tag" style="color:#ff3366; border-color:rgba(255,51,102,0.3);">v3.3.6</span>`;
                        }
                        sendSecurityAuditLog("CODE_RED_ENGAGED", `System structural lock initiated standard override context protocol [${criticalModeName}].`);
                    } else {
                        isCriticalAlertActive = false;
                        navbarElement.classList.remove("code-red-alert");
                        if (logoElement) {
                            logoElement.innerHTML = `Nexus <span class="version-tag">v3.3.6</span>`;
                        }
                    }

                    interceptShield.style.backgroundColor = "#000000"; 
                    interceptShield.style.display = "block";           
                    interceptShield.style.pointerEvents = "auto";       
                    interceptShield.style.width = "100vw";
                    interceptShield.style.height = "100vh";
                    interceptShield.src = targetPage;                  
                }

                if (dbCommand === "SHUTDOWN") {
                    triggerInstantLockdown("complete_shutdown.html", "SHUTDOWN");
                } 
                else if (dbCommand === "MAINTENANCE") {
                    triggerInstantLockdown("maintenance.html?end=" + encodeURIComponent(targetTimer), "MAINTENANCE");
                } 
                else if (dbCommand === "SECURITY_LOCK") {
                    triggerInstantLockdown("security_m.html", "SECURITY_LOCK");
                } 
                else if (dbCommand === "TESTING") {
                    triggerInstantLockdown("testing.html", "TESTING");
                }
                else if (dbCommand === "LOCKDOWN") {
                    triggerInstantLockdown("fully-complete-shutdown.html", "LOCKDOWN");
                }
                else if (dbCommand === "SUNDAY_UPDATE") {
                    triggerInstantLockdown("Sunday_updates.html", "SUNDAY_UPDATE");
                }
                else if (dbCommand === "NEW_UPDATE") {
                    triggerInstantLockdown("updates_app.html", "NEW_UPDATE");
                }
                else if (dbCommand === "STAFF") {
                    triggerInstantLockdown("staffportal.html", "STAFF");
                }
                else {
                    isCriticalAlertActive = false;
                    if (!data["system"]["broadcast"]) {
                        navbarElement.classList.remove("code-red-alert");
                    }
                    if (logoElement) {
                        logoElement.innerHTML = `Nexus <span class="version-tag">v3.3.6</span>`;
                    }

                    interceptShield.src = "about:blank";
                    interceptShield.style.display = "none";
                    interceptShield.style.pointerEvents = "none";
                    interceptShield.style.width = "0px";
                    interceptShield.style.height = "0px";
                }
            } catch(innerError) {
                console.error("Critical stream breakdown inside root dashboard configuration layer: ", innerError);
            }
        });
    </script>
</body>
</html>
