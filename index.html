<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; background-color: #000000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .dashboard-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Master Navbar Layer */
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #000000; padding: 15px 20px; border-bottom: 2px solid #00ffcc;
            position: relative; z-index: 100000;
        }
        .brand-logo { color: #ffffff; font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            color: #a0a0b0; text-decoration: none; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px;
            border-radius: 4px; cursor: pointer; background: transparent; border: none;
        }
        .nav-btn:hover, .nav-btn.active-tab { color: #00ffcc; background-color: rgba(0, 255, 204, 0.1); }
        
        .iframe-workspace { flex-grow: 1; width: 100%; height: 100%; position: relative; background: #000000; }
        .app-view-frame { width: 100%; height: 100%; border: none; display: block; }
        #more-menu-overlay-panel { position: absolute; top: 0; left: 0; z-index: 9999; display: none; background: #000000; }
    </style>
</head>
<body>

    <script>
        if (localStorage.getItem("nexus_critical_lockdown") === "active") {
            window.stop();
            document.write('<div style="background:#000;color:#ff3366;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:1.5rem;font-weight:bold;letter-spacing:2px;">⚠️ CRITICAL EMERGENCY PLATFORM SHUTDOWN IN EFFECT ⚠️</div>');
        }
    </script>

    <div class="dashboard-container" id="master-app-wrapper">
        <header class="top-navbar">
            <div class="brand-logo">Nexus</div>
            <nav class="nav-links">
                <a href="home.html" target="main-display-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="updates.html" target="main-display-viewport" class="nav-btn" onclick="switchActive(this)">Updates</a>
                <button id="more-toggle-btn" class="nav-btn" onclick="toggleMoreMenu()">More ▾</button>
            </nav>
        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="main-display-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
            <iframe src="menu.html" id="more-menu-overlay-panel" class="app-view-frame"></iframe>
        </div>
    </div>

    <script>
        let isMoreMenuOpen = false;

        function switchActive(element) {
            if(isMoreMenuOpen) toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        function toggleMoreMenu() {
            const panel = document.getElementById("more-menu-overlay-panel");
            const btn = document.getElementById("more-toggle-btn");
            if (!isMoreMenuOpen) {
                panel.style.display = "block";
                panel.src = "menu.html";
                btn.innerHTML = "Close ✕";
                isMoreMenuOpen = true;
            } else {
                panel.style.display = "none";
                btn.innerHTML = "More ▾";
                isMoreMenuOpen = false;
            }
        }

        window.loadExternalLinkFromMoreMenu = function(targetUrl) {
            document.getElementById("main-viewport-iframe").src = targetUrl;
            toggleMoreMenu();
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const rootRef = ref(database);

        onValue(rootRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const systemState = data["System"];
            const securityBot = data["AI Security Sentinel Status"];
            const testerBot = data["AI Tester Bot Status"];

            // 🚨 CRITICAL LOCKDOWN DISPATCH TRIGGER
            if (systemState === "SHUTDOWN" || securityBot === "active" || testerBot === "active") {
                localStorage.setItem("nexus_critical_lockdown", "active");
                
                // Blast away the entire page and replace it with a locked shield overlay
                document.getElementById("master-app-wrapper").innerHTML = `
                    <div style="background-color:#000000; width:100vw; height:100vh; position:fixed; top:0; left:0; z-index:2147483647; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ff3366; font-family:monospace; text-align:center; padding:20px;">
                        <h1 style="font-size:2rem; margin-bottom:10px; letter-spacing:3px;">[ SYSTEM TERMINATION PROTOCOL ]</h1>
                        <p style="color:#a0a0b0; font-size:0.9rem;">Nexus core architecture has been locked by automated administration tools.</p>
                        <div style="margin-top:20px; border:1px dashed #ff3366; padding:10px 20px; font-size:0.8rem; color:#ff3366;">STATUS: OFFLINE_SHUTDOWN_SEQUENCE</div>
                    </div>
                `;
                return;
            }

            // Clean boot if system metrics are marked safe
            localStorage.removeItem("nexus_critical_lockdown");
        });
    </script>
</body>
</html>
