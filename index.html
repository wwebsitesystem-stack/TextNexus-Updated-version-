<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | The Future is Here</title>
    <style>
        :root {
            --primary-glow: #00f2fe;
            --bg-dark: #030305;
            --text-main: #ffffff;
            --text-muted: #888899;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-dark); overflow: hidden; height: 100vh; width: 100vw; }

        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 25px 60px; background: rgba(3, 3, 5, 0.6);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); z-index: 1000;
        }

        .logo { font-size: 24px; font-weight: 900; letter-spacing: 3px; color: var(--text-main); text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .logo::before { content: ''; display: inline-block; width: 12px; height: 12px; background: var(--primary-glow); border-radius: 50%; box-shadow: 0 0 15px var(--primary-glow); }

        nav ul { display: flex; list-style: none; gap: 40px; }
        nav ul li a {
            text-decoration: none; color: var(--text-muted); font-size: 13px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.4s ease; cursor: pointer; position: relative;
        }
        
        nav ul li a:hover, nav ul li a.active { color: var(--text-main); }
        nav ul li a::after {
            content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%) scale(0);
            width: 4px; height: 4px; border-radius: 50%; background: var(--primary-glow); transition: transform 0.4s ease;
        }
        nav ul li a.active::after { transform: translateX(-50%) scale(1); box-shadow: 0 0 10px var(--primary-glow); }

        /* The Window looking at your other files */
        .content-frame {
            position: absolute; top: 80px; left: 0; width: 100%; height: calc(100vh - 80px);
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nexus</div>
        <nav>
            <ul>
                <li><a href="home.html" target="nexus-window" class="nav-link active" onclick="updateNav(this)">Home</a></li>
                <li><a href="ghost_link.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">Ghost Link</a></li>
                <li><a href="hand_tracking.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">AI Hand Tracking</a></li>
                <li><a href="credits.html" target="nexus-window" class="nav-link" onclick="updateNav(this)">Credits</a></li>
            </ul>
        </nav>
    </header>

    <iframe name="nexus-window" src="home.html" class="content-frame"></iframe>

    <script>
        // This tiny script just moves the glowing dot on the top navigation
        function updateNav(clickedLink) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            clickedLink.classList.add('active');
        }
    </script>
</body>
</html>
