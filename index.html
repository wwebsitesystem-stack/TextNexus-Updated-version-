<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; background-color: #000000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .dashboard-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Master Protected Navbar Layer */
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #000000; padding: 15px 20px; border-bottom: 2px solid #00ffcc;
            position: relative; z-index: 100000;
        }
        .brand-logo { color: #ffffff; font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            color: #a0a0b0; text-decoration: none; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px;
            border-radius: 4px; cursor: pointer; background: transparent; border: none; outline: none;
        }
        .nav-btn:hover, .nav-btn.active-tab { color: #00ffcc; background-color: rgba(0, 255, 204, 0.1); }
        
        /* Viewport Frame Panel Layout */
        .iframe-workspace { flex-grow: 1; width: 100%; height: 100%; position: relative; background: #000000; }
        .app-view-frame { width: 100%; height: 100%; border: none; display: block; background: #000000; }
        
        /* Overlay Navigation Panel Configuration */
        #more-menu-overlay-panel { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; background: #000000; 
        }
    </style>
</head>
<body>

    <div class="dashboard-container" id="master-app-wrapper">
        <header class="top-navbar">
            <div class="brand-logo">Nexus</div>
            <nav class="nav-links">
                <a href="home.html" target="nexus-main-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="updates.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">Updates</a>
                <button id="more-toggle-btn" class="nav-btn" onclick="toggleMoreMenu()">More ▾</button>
            </nav>
        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="nexus-main-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
            <iframe src="menu.html" id="more-menu-overlay-panel" class="app-view-frame"></iframe>
        </div>
    </div>

    <script>
        let isMoreMenuOpen = false;

        function switchActive(element) {
            if(isMoreMenuOpen) toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        function toggleMoreMenu() {
            const panel = document.getElementById("more-menu-overlay-panel");
            const btn = document.getElementById("more-toggle-btn");
            if (!isMoreMenuOpen) {
                panel.style.display = "block";
                panel.src = "menu.html"; // Forces fresh load configuration
                btn.innerHTML = "Close ✕";
                isMoreMenuOpen = true;
            } else {
                panel.style.display = "none";
                btn.innerHTML = "More ▾";
                isMoreMenuOpen = false;
            }
        }

        // Bridge function linking menu.html routing inputs safely to the master viewport panel
        window.loadExternalLinkFromMoreMenu = function(targetUrl) {
            const mainFrame = document.getElementById("main-viewport-iframe");
            if (mainFrame) {
                mainFrame.src = targetUrl;
            }
            toggleMoreMenu();
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const rootRef = ref(database);

        onValue(rootRef, (snapshot) => {
            const data = snapshot.val();
            
            // Failsafe 1: If data hasn't loaded yet or database streams hit a lag spike, do not trigger a false shutdown
            if (!data) {
                console.log("Waiting for backend sequence data link...");
                return;
            }

            const systemState = data["System"];
            const securityBot = data["AI Security Sentinel Status"];
            const testerBot = data["AI Tester Bot Status"];

            // 🚨 TARGETED SHUTDOWN PROTOCOL INTERCEPT
            if (systemState === "SHUTDOWN" || securityBot === "active" || testerBot === "active") {
                console.log("🚨 RECTIFYING CRITICAL SYSTEM LOCKDOWN PROTOCOL.");
                
                // Completely erase the operational dashboard code and seal the document layer
                document.getElementById("master-app-wrapper").innerHTML = `
                    <div style="background-color:#000000; width:100vw; height:100vh; position:fixed; top:0; left:0; z-index:2147483647; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#ff3366; font-family:monospace; text-align:center; padding:20px;">
                        <h1 style="font-size:1.8rem; margin-bottom:12px; letter-spacing:3px;">[ CORE TERMINATION IN EFFECT ]</h1>
                        <p style="color:#a0a0b0; font-size:0.85rem; max-width:500px; line-height:1.4;">Nexus framework access metrics have been hardbound to administrative quarantine by order of network lead.</p>
                        <div style="margin-top:25px; border:1px dashed #ff3366; padding:12px 24px; font-size:0.75rem; color:#ff3366; letter-spacing:1px;">CONSOLE_STATUS: OFFLINE_HALT</div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
