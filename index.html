<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Platform Core</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; background-color: #000000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .dashboard-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Master Navbar Layer */
        .top-navbar {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #000000; padding: 12px 20px; border-bottom: 2px solid #00ffcc;
            position: relative; z-index: 100000;
        }
        .brand-logo { color: #ffffff; font-size: 1.3rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .nav-btn {
            color: #a0a0b0; text-decoration: none; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px;
            border-radius: 4px; cursor: pointer; background: transparent; border: none; outline: none;
            transition: all 0.2s ease;
        }
        .nav-btn:hover, .nav-btn.active-tab { color: #00ffcc; background-color: rgba(0, 255, 204, 0.1); }
        
        /* Viewport Frame Panel Layout */
        .iframe-workspace { flex-grow: 1; width: 100%; height: 100%; position: relative; background: #000000; }
        .app-view-frame { width: 100%; height: 100%; border: none; display: block; background: #000000; }
        
        /* Overlay Navigation Panel Configuration */
        #more-menu-overlay-panel { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: none; background: #000000; 
        }

        /* Intercept Shield Layer - Strictly starts Hidden and Unset */
        #system-intercept-shield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; z-index: 2147483647; display: none; border: none;
        }
    </style>
</head>
<body>

    <iframe id="system-intercept-shield" src="about:blank"></iframe>

    <div class="dashboard-container" id="master-app-wrapper">
        <header class="top-navbar">
            <div class="brand-logo">Nexus</div>
            <nav class="nav-links">
                <a href="home.html" target="nexus-main-viewport" class="nav-btn active-tab" onclick="switchActive(this)">Home</a>
                <a href="updates.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">Updates</a>
                <a href="ghostlink.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">👻 GhostLink</a>
                <a href="ai-core.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">🧠 AI Core</a>
                <a href="security.html" target="nexus-main-viewport" class="nav-btn" onclick="switchActive(this)">🛡️ Security</a>
                <button id="more-toggle-btn" class="nav-btn" onclick="toggleMoreMenu()">More ▾</button>
            </nav>
        </header>

        <div class="iframe-workspace">
            <iframe src="home.html" name="nexus-main-viewport" id="main-viewport-iframe" class="app-view-frame"></iframe>
            <iframe src="menu.html" id="more-menu-overlay-panel" class="app-view-frame"></iframe>
        </div>
    </div>

    <script>
        let isMoreMenuOpen = false;

        function switchActive(element) {
            if(isMoreMenuOpen) toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
            element.classList.add('active-tab');
        }

        function toggleMoreMenu() {
            const panel = document.getElementById("more-menu-overlay-panel");
            const btn = document.getElementById("more-toggle-btn");
            if (!isMoreMenuOpen) {
                panel.style.display = "block";
                panel.src = "menu.html"; 
                btn.innerHTML = "Close ✕";
                isMoreMenuOpen = true;
            } else {
                panel.style.display = "none";
                btn.innerHTML = "More ▾";
                isMoreMenuOpen = false;
            }
        }

        window.loadExternalLinkFromMoreMenu = function(targetUrl) {
            const mainFrame = document.getElementById("main-viewport-iframe");
            if (mainFrame) {
                mainFrame.src = targetUrl;
            }
            toggleMoreMenu();
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-tab'));
        };
    </script>

    <script type="module">
        try {
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
            import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

            const firebaseConfig = {
                apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
                authDomain: "nexus-web-development-official.firebaseapp.com",
                databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
                projectId: "nexus-web-development-official"
            };

            const app = initializeApp(firebaseConfig);
            const database = getDatabase(app);
            const rootRef = ref(database);

            const interceptShield = document.getElementById("system-intercept-shield");
            let lastCommandState = "";

            onValue(rootRef, (snapshot) => {
                try {
                    const data = snapshot.val();
                    if (!data) return;

                    let dbCommand = "";
                    let targetTimer = "";

                    if (data["system"]) {
                        if (data["system"]["command"]) dbCommand = data["system"]["command"].trim();
                        if (data["system"]["timer"]) targetTimer = data["system"]["timer"].trim();
                    }

                    const stateSignature = dbCommand + "_" + targetTimer;
                    if (stateSignature === lastCommandState) return; 
                    lastCommandState = stateSignature;

                    // Execute routing based strictly on matching command keys
                    if (dbCommand === "SHUTDOWN") {
                        interceptShield.src = "complete_shutdown.html";
                        interceptShield.style.display = "block";
                    } 
                    else if (dbCommand === "MAINTENANCE") {
                        interceptShield.src = "maintenance.html?end=" + encodeURIComponent(targetTimer);
                        interceptShield.style.display = "block";
                    } 
                    else if (dbCommand === "SECURITY_LOCK") {
                        interceptShield.src = "security_m.html";
                        interceptShield.style.display = "block";
                    } 
                    else if (dbCommand === "TESTING") {
                        interceptShield.src = "testing.html";
                        interceptShield.style.display = "block";
                    }
                    else if (dbCommand === "COMPLETE_SHUTDOWN") {
                        interceptShield.src = "fully-complete-shutdown.html"
                        interceptShielf.style.display = "block";
                    } 
                    else {
                        interceptShield.src = "about:blank";
                        interceptShield.style.display = "none";
                    }
                } catch(innerError) {
                    console.error("Database parsing exception intercepted: ", innerError);
                }
            });
        } catch (globalError) {
            console.error("Critical core failure bypassed: ", globalError);
        }
    </script>
</body>
</html>
