<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Canvas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Main Outer Container Window */
        .outer-frame {
            background-color: #030305;
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            border-radius: 24px;
            border: 1px solid #1a1a24;
            display: flex;
            flex-direction: column; /* Stacks navigation on top of iframe */
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        /* Header Navigation bar inside the frame */
        .nav-header {
            display: flex;
            gap: 25px;
            padding: 25px 40px 15px 40px;
            border-bottom: 1px solid #1a1a24;
        }

        .nav-btn {
            color: #a0a0b0;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .nav-btn:hover {
            color: #00ffcc; /* Cyan glow on hover */
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        /* The actual iframe container filling the rest of the space */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        .main-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="outer-frame">
        <header class="nav-header">
            <a href="home.html" target="content-frame" class="nav-btn">Home</a>
            <a href="collaboration.html" target="content-frame" class="nav-btn">Collaboration</a>
        </header>

        <div class="iframe-container">
            <iframe src="home.html" name="content-frame" class="main-iframe"></iframe>
        </div>
    </div>

</body>
</html>
