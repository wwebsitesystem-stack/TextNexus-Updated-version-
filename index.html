<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Global Command HUD</title>
    <style>
        :root { 
            --jarvis-blue: #00f0ff; 
            --jarvis-glow: rgba(0, 240, 255, 0.35);
            --jarvis-dim: rgba(0, 240, 255, 0.1);
            --bg-dark: #02060d; 
            --hud-surface: rgba(4, 12, 24, 0.65);
            --text-main: #d1f4ff; 
            --text-muted: #52788e;
            --alert-orange: #ff9900;
            --font-family: 'Consolas', 'Courier New', Monaco, monospace;
        }

        body { 
            background-color: var(--bg-dark); 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 240, 255, 0.04) 0%, transparent 70%),
                linear-gradient(rgba(0, 240, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            font-family: var(--font-family);
            color: var(--text-main);
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        header { 
            position: relative; margin: 20px 24px 10px 24px; flex-shrink: 0; height: 64px; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 30px; 
            background: var(--hud-surface); backdrop-filter: blur(15px); border: 1px solid rgba(0, 240, 255, 0.25); 
            border-radius: 4px; z-index: 1000; box-shadow: 0 0 30px rgba(0, 240, 255, 0.05);
        }

        header::before, header::after { content: ''; position: absolute; width: 12px; height: 12px; border-color: var(--jarvis-blue); border-style: solid; }
        header::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        header::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        .brand-container { display: flex; align-items: center; gap: 20px; }
        .logo-matrix { display: flex; flex-direction: column; }
        .logo { font-weight: 900; letter-spacing: 5px; color: #ffffff; text-transform: uppercase; font-size: 20px; text-shadow: 0 0 10px var(--jarvis-glow); }
        .logo-sub { font-size: 8px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

        .status-pill {
            display: flex; align-items: center; gap: 8px; background: rgba(0, 240, 255, 0.05); 
            border: 1px solid rgba(0, 240, 255, 0.2); padding: 5px 12px; border-radius: 2px; font-size: 10px; color: var(--jarvis-blue);
        }
        .status-dot { width: 6px; height: 6px; background-color: var(--jarvis-blue); border-radius: 50%; box-shadow: 0 0 10px var(--jarvis-blue); animation: pulse 1.5s infinite; }

        .nav-container { display: flex; align-items: center; gap: 20px; }
        nav ul { display: flex; list-style: none; gap: 2px; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; padding: 10px 14px; transition: all 0.2s; }
        nav ul li a:hover, nav ul li a.active { color: var(--jarvis-blue); background: rgba(0, 240, 255, 0.07); text-shadow: 0 0 8px var(--jarvis-glow); }
        nav ul li a.owner-link { color: var(--alert-orange); }

        .auth-module { display: flex; align-items: center; }
        .btn-auth { background: transparent; color: var(--jarvis-blue); border: 1px solid var(--jarvis-blue); padding: 8px 18px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; }
        
        .user-profile { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 1px solid var(--jarvis-blue); cursor: pointer; background: rgba(0,240,255,0.02); }
        .user-avatar { width: 100%; height: 100%; object-fit: cover; }

        .cyber-modal {
            position: fixed; top: 105px; right: 24px; width: 340px; max-height: 80vh; overflow-y: auto;
            background: rgba(3, 10, 20, 0.98); border: 1px solid var(--jarvis-blue); padding: 24px; 
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15); z-index: 2000; transition: all 0.25s ease;
            transform: scale(0.95) translateY(-10px); opacity: 0; pointer-events: none;
        }
        .cyber-modal.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
        .modal-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #ffffff; margin-bottom: 15px; border-left: 2px solid var(--jarvis-blue); padding-left: 8px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 9px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; box-sizing: border-box; background: rgba(0, 240, 255, 0.03); border: 1px solid rgba(0, 240, 255, 0.2); padding: 8px 10px; color: #ffffff; font-size: 11px; font-family: var(--font-family); }
        .form-group input[type="file"] { display: none; }
        
        .file-upload-label { display: block; text-align: center; background: rgba(0, 240, 255, 0.05); border: 1px dashed rgba(0, 240, 255, 0.4); padding: 10px; font-size: 10px; color: var(--jarvis-blue); cursor: pointer; text-transform: uppercase; }
        
        .modal-btn { width: 100%; background: rgba(0, 240, 255, 0.08); border: 1px solid var(--jarvis-blue); color: var(--jarvis-blue); padding: 10px; font-size: 11px; font-family: var(--font-family); cursor: pointer; margin-top: 8px; text-transform: uppercase; }
        .modal-btn:hover { background: var(--jarvis-blue); color: var(--bg-dark); }
        .modal-btn.danger { border-color: #ff3b3b; color: #ff3b3b; background: transparent; }
        .modal-btn.danger:hover { background: #ff3b3b; color: #fff; }

        .crypto-divider { border-top: 1px dashed rgba(0, 240, 255, 0.2); margin: 15px 0; padding-top: 10px; }

        .frame-container { flex-grow: 1; width: calc(100% - 48px); margin: 0 24px 24px 24px; position: relative; border: 1px solid rgba(0, 240, 255, 0.2); background: rgba(2, 8, 16, 0.7); }
        #nexusFrame { width: 100%; height: 100%; border: none; display: block; }
        
        .frame-loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .frame-loader.loading { opacity: 0.98; pointer-events: all; }
        .spinner { width: 40px; height: 40px; border: 1px dashed var(--jarvis-blue); border-top: 2px solid var(--jarvis-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <div class="logo-matrix"><div class="logo">Nexus</div><div class="logo-sub">AI_HUD_INTERFACE_V4.5</div></div>
            <div class="status-pill"><div class="status-dot"></div><span id="system-status-text">SYS_STATUS // ONLINE</span></div>
        </div>
        <div class="nav-container">
            <nav>
                <ul id="navigationMenu">
                    <li><a href="home.html" target="nexus-window" class="nav-link active">Home</a></li>
                    <li><a href="ghostlink.html" target="nexus-window" class="nav-link">Ghost Link</a></li>
                    <li><a href="TextNexus.html" target="nexus-window" class="nav-link">TextNexus</a></li>
                    <li><a href="hand_tracking.html" target="nexus-window" class="nav-link">AI Core</a></li>
                    <li><a href="security.html" target="nexus-window" class="nav-link">Security</a></li>
                    <li><a href="website_information.html" target="nexus-window" class="nav-link">About</a></li>
                    <li id="ownerTab" class="hidden"><a href="owner-panel.html" target="nexus-window" class="nav-link owner-link">Owner Panel</a></li>
                </ul>
            </nav>
            <div class="auth-module">
                <button id="btnOpenAuth" class="btn-auth">SECURE_LOGIN</button>
                <div id="userProfile" class="user-profile hidden"><img id="userImg" class="user-avatar" src="" alt="Core Node"></div>
            </div>
        </div>
    </header>

    <!-- AUTHENTICATION DIALOGUE -->
    <div id="authModal" class="cyber-modal">
        <div id="modalTitle" class="modal-title">ACCESS_REQUISITION</div>
        <form id="authForm">
            <div class="form-group hidden" id="groupUsername"><label>Callsign</label><input type="text" id="authUsername" placeholder="Operator Tag"></div>
            <div class="form-group"><label>Identity Email</label><input type="email" id="authEmail" required placeholder="name@nexus.net"></div>
            <div class="form-group"><label>Cryptokey Pass</label><input type="password" id="authPassword" required placeholder="••••••••"></div>
            <button type="submit" id="btnSubmitAuth" class="modal-btn">INITIALIZE_LINK</button>
        </form>
        <div style="text-align:center; font-size:10px; margin-top:15px; cursor:pointer; color:var(--text-muted);" id="toggleAuthMode">Create new matrix node? <span style="color:var(--jarvis-blue)">Register</span></div>
    </div>

    <!-- PROFILE MODIFICATION PARAMETERS (WITH UPLOAD, PASSKEYS & SMS PROTOCOLS) -->
    <div id="settingsModal" class="cyber-modal">
        <div class="modal-title">MUTATION_MATRIX_PROPERTIES</div>
        
        <div class="form-group">
            <label>Avatar Visual Matrix</label>
            <label for="avatarUpload" class="file-upload-label" id="uploadLabel">Upload Image File</label>
            <input type="file" id="avatarUpload" accept="image/*">
        </div>
        
        <div class="form-group"><label>Callsign Tag</label><input type="text" id="settingsUsername"></div>
        <button id="btnSaveSettings" class="modal-btn">SAVE_BASIC_CHANGES</button>

        <div class="crypto-divider"></div>
        <div class="modal-title">HARDWARE_SECURITY_KEYS</div>
        <button id="btnCreatePasskey" class="modal-btn" style="border-color:#a855f7; color:#a855f7;">GENERATE_LOCAL_PASSKEY</button>
        
        <div class="crypto-divider"></div>
        <div class="modal-title">PHONE_TEXT_CERTIFICATION (2FA)</div>
        <div class="form-group"><label>Mobile Phone Vector</label><input type="tel" id="smsPhone" placeholder="+1234567890"></div>
        <button id="btnRegisterSMS" class="modal-btn" style="border-color:var(--alert-orange); color:var(--alert-orange);">PROVISION_SMS_2FA</button>

        <div class="crypto-divider"></div>
        <button id="btnSignOut" class="modal-btn danger">TERMINATE_COMM_LINK</button>
    </div>

    <div class="frame-container">
        <div class="frame-loader" id="frameLoader"><div class="spinner"></div></div>
        <iframe name="nexus-window" src="home.html" id="nexusFrame"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const frame = document.getElementById('nexusFrame');
        const statusText = document.getElementById('system-status-text');
        const ownerTab = document.getElementById('ownerTab');
        const authModal = document.getElementById('authModal');
        const settingsModal = document.getElementById('settingsModal');
        const btnOpenAuth = document.getElementById('btnOpenAuth');
        const userProfile = document.getElementById('userProfile');
        const userImg = document.getElementById('userImg');
        const avatarUpload = document.getElementById('avatarUpload');
        const uploadLabel = document.getElementById('uploadLabel');

        let isSignUpMode = false;
        let b64AvatarData = "";

        btnOpenAuth.addEventListener('click', () => { settingsModal.classList.remove('open'); authModal.classList.toggle('open'); });
        userProfile.addEventListener('click', () => { authModal.classList.remove('open'); settingsModal.classList.toggle('open'); });

        // Handle Dynamic Local File Read
        avatarUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            uploadLabel.innerText = file.name.substring(0, 20) + "...";
            const reader = new FileReader();
            reader.onloadend = () => { b64AvatarData = reader.result; };
            reader.readAsDataURL(file);
        });

        // 2FA SMS Mock-Provisioning
        document.getElementById('btnRegisterSMS').addEventListener('click', () => {
            const phone = document.getElementById('smsPhone').value;
            if(!phone) return alert("INPUT_REQUIRED: Provide valid terminal phone target.");
            if(auth.currentUser) {
                update(ref(db, `Users/${auth.currentUser.uid}`), { phoneVerification: phone, sms2FAEnabled: true })
                .then(() => alert(`CERTIFICATION_ESTABLISHED: Two-Factor linked to ${phone}`));
            }
        });

        // Passkey (WebAuthn Platform Auth Entry Mock)
        document.getElementById('btnCreatePasskey').addEventListener('click', async () => {
            if(!auth.currentUser) return;
            alert("INITIALIZING_HARDWARE_AUTHENTICATOR... Press your security key or biometric sensor.");
            setTimeout(() => {
                const mockCredentialId = btoa(Math.random().toString()).substring(0, 16);
                update(ref(db, `Users/${auth.currentUser.uid}`), { passkeyRegistered: true, credentialId: mockCredentialId })
                .then(() => alert("PASSKEY_LINKED: Device hardware handshake registered."));
            }, 1200);
        });

        document.getElementById('toggleAuthMode').addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('modalTitle').innerText = isSignUpMode ? "PROVISION_NEW_CORE_ID" : "ACCESS_REQUISITION";
            document.getElementById('groupUsername').classList.toggle('hidden', !isSignUpMode);
        });

        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if (isSignUpMode) {
                const username = document.getElementById('authUsername').value || "Operator";
                createUserWithEmailAndPassword(auth, email, password).then((cred) => {
                    set(ref(db, `Users/${cred.user.uid}`), { email, username, role: "user", whitelistBypass: false, consentCamera: "pending", consentPhotos: "pending" });
                    location.reload();
                });
            } else {
                signInWithEmailAndPassword(auth, email, password).then(() => authModal.classList.remove('open'));
            }
        });

        document.getElementById('btnSaveSettings').addEventListener('click', async () => {
            const user = auth.currentUser; if (!user) return;
            const newName = document.getElementById('settingsUsername').value;
            const updates = {};
            if (newName) updates.username = newName;
            if (b64AvatarData) updates.avatarBase64 = b64AvatarData;

            if (Object.keys(updates).length > 0) {
                update(ref(db, `Users/${user.uid}`), updates).then(() => {
                    if (b64AvatarData) updateProfile(user, { photoURL: b64AvatarData });
                    alert("IDENTITY_MUTATION_COMPLETE");
                    location.reload();
                });
            }
        });

        document.getElementById('btnSignOut').addEventListener('click', () => { signOut(auth).then(() => location.reload()); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                btnOpenAuth.classList.add('hidden'); userProfile.classList.remove('hidden');
                onValue(ref(db, `Users/${user.uid}`), (snapshot) => {
                    const data = snapshot.val() || {};
                    userImg.src = data.avatarBase64 || "https://i.imgur.com/6VB8Hz0.png";
                    document.getElementById('settingsUsername').value = data.username || "";
                    
                    if (data.role === "owner" || user.email.toLowerCase() === "brodywilliams0226@gmail.com") {
                        ownerTab.classList.remove('hidden');
                    }
                    
                    // Check if modern dynamic privacy framework has been answered
                    if (!data.consentCamera || data.consentCamera === "pending") {
                        frame.src = "trust.html";
                    }
                });
            }
        });

        onValue(ref(db, 'System'), (snapshot) => {
            const state = snapshot.val() || "ONLINE";
            statusText.innerText = state === "ONLINE" ? "SYS_STATUS // ONLINE" : `SYS_ALARM // ${state}`;
        });
    </script>
</body>
</html>
