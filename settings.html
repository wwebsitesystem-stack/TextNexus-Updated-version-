<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus - Settings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent; /* Blends seamlessly into index.html */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .main-content {
            max-width: 600px;
            width: 100%;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Profile Card Shell */
        .profile-card {
            background-color: #050508;
            border: 1px solid #1a1a24;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .avatar-group {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .settings-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #00ffcc;
            background-color: #1a1a24;
            object-fit: cover;
        }

        .user-meta-email {
            font-size: 0.85rem;
            color: #505064;
            font-family: monospace;
            margin-top: 4px;
        }

        /* Form Controls */
        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #a0a0b0;
            margin-bottom: 10px;
        }

        .settings-input {
            width: 100%;
            background-color: #000000;
            border: 1px solid #1a1a24;
            border-radius: 6px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
            margin-bottom: 20px;
        }

        .settings-input:focus {
            border-color: #00ffcc;
        }

        .save-btn {
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .save-btn:hover {
            background-color: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #1a1a24;
            padding-top: 30px;
            margin-top: 40px;
        }

        .contact-heading {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #505064;
            margin-bottom: 10px;
        }

        .email-link {
            color: #00ffcc;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1 class="page-title">System Settings</h1>

        <div class="profile-card">
            <div class="avatar-group">
                <img src="" alt="Profile Picture" class="settings-avatar" id="user-avatar" style="display: none;">
                <div>
                    <h3 id="profile-display-name" style="font-weight: 600;">Loading Session...</h3>
                    <p class="user-meta-email" id="profile-email"></p>
                </div>
            </div>

            <label class="input-label" for="username-field">Change Username</label>
            <input type="text" id="username-field" class="settings-input" placeholder="Enter custom identity handle...">

            <button class="save-btn" id="save-settings-btn">Update Profile</button>
            <div class="status-message" id="form-feedback"></div>
        </div>
    </div>

    <div class="footer">
        <div class="contact-heading">Contact Support</div>
        <a href="mailto:Text.Nexus.Official@outlook.com" class="email-link">Text.Nexus.Official@outlook.com</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase configuration (Using your exact credentials)
        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:ea4469b06c2c01cc999306",
            measurementId: "G-S6K1M5PZLE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const avatarImg = document.getElementById('user-avatar');
        const displayNameText = document.getElementById('profile-display-name');
        const emailText = document.getElementById('profile-email');
        const usernameInput = document.getElementById('username-field');
        const saveButton = document.getElementById('save-settings-btn');
        const feedback = document.getElementById('form-feedback');

        // Watch for active login status and fill out fields
        onAuthStateChanged(auth, (user) => {
            if (user) {
                displayNameText.innerText = user.displayName || "Anonymous User";
                emailText.innerText = user.email;
                usernameInput.value = user.displayName || "";
                
                if (user.photoURL) {
                    avatarImg.src = user.photoURL;
                    avatarImg.style.display = 'block';
                }
            } else {
                displayNameText.innerText = "No User Active";
                emailText.innerText = "Please sign in from the main interface panel header.";
                saveButton.disabled = true;
            }
        });

        // Handle updating the username / display name
        saveButton.addEventListener('click', () => {
            const currentUser = auth.currentUser;
            const newUsername = usernameInput.value.trim();

            if (currentUser && newUsername) {
                feedback.style.color = '#00ffcc';
                feedback.innerText = "Synchronizing updates...";
                
                updateProfile(currentUser, {
                    displayName: newUsername
                }).then(() => {
                    feedback.style.color = '#10b981';
                    feedback.innerText = "Identity context successfully updated!";
                    displayNameText.innerText = newUsername;
                    
                    // Force parent window navbar to refresh user details if applicable
                    if(window.parent && window.parent.location) {
                        // Quick optional fallback page notification
                    }
                }).catch((error) => {
                    feedback.style.color = '#ef4444';
                    feedback.innerText = "Error syncing: " + error.message;
                });
            }
        });
    </script>

</body>
</html>
